const SUPABASE_URL = "https://qhsjzahnqopgtjgsmhro.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoc2p6YWhucW9wZ3RqZ3NtaHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjAxODIsImV4cCI6MjA5OTU5NjE4Mn0.X9hLFAJ5AtS3OkiCBmnXN5a7m_k7InkL-TPOwPCjQkQ";

/* ===== 팔레트 ===== */
const C = {
  ink: "#12141C", inkSoft: "#242938", inkLine: "#333A4D",
  amber: "#FF9F1C", amberSoft: "#FFF1DD", amberLine: "#FFD9A0",
  teal: "#0F8B8D", tealSoft: "#E4F5F4",
  steel: "#9AA3B2", steelSoft: "#EEF0F3",
  copper: "#C87F4B", copperSoft: "#F7E9DD",
  bg: "#F5F6F8", card: "#FFFFFF",
  text: "#1B1F2A", sub: "#6E7686", border: "#E6E8EE",
  danger: "#E5484D",
  // 기존 코드 전체에서 쓰던 이름들을 새 팔레트로 매핑 (남색->차콜, 에메랄드->앰버, 금/은/동->앰버/스틸/코퍼)
  navy: "#12141C", slate: "#242938",
  emerald: "#FF9F1C", emeraldSoft: "#FFF1DD",
  gold: "#FF9F1C", goldSoft: "#FFF1DD",
  silver: "#9AA3B2", silverSoft: "#EEF0F3",

};

const FONT_BODY = "'Pretendard Variable', 'Pretendard', 'Noto Sans KR', sans-serif";

/* ===== 마스킹 ===== */
function maskName(name) {
  if (!name) return "";
  const chars = Array.from(name.trim());
  if (chars.length <= 1) return chars.join("");
  if (chars.length === 2) return chars[0] + "ㅇ";
  return chars[0] + "ㅇ".repeat(chars.length - 2) + chars[chars.length - 1];
}
function maskPhone(phone) {
  if (!phone) return "";
  const digits = phone.replace(/[^0-9]/g, "");
  if (digits.length === 11) return `${digits.slice(0,3)}-XXXX-${digits.slice(7)}`;
  if (digits.length === 10) return `${digits.slice(0,3)}-XXX-${digits.slice(6)}`;
  return phone;
}

const ROLE_KEYS = ["ROLE_1", "ROLE_2", "ROLE_3", "ROLE_4"];
const ROLE_METRIC_TYPE = { ROLE_1: "count", ROLE_2: "count", ROLE_3: "count", ROLE_4: "count" };
const REGIONS = ["본부", "북구", "광산"];
const DEPT_KEYS = ["DEPT_A","DEPT_B","DEPT_C","DEPT_D","DEPT_E","DEPT_F","DEPT_G","DEPT_H","DEPT_I"];
const deptLabel = (k) => k;

const inputStyle = { width: "100%", border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, outline: "none", fontFamily: FONT_BODY };

function Field({ label, children }) {
  return <div><div style={{ color: C.sub }} className="text-xs font-semibold mb-1">{label}</div>{children}</div>;
}
function RegionTag({ region }) {
  const colors = { 본부: C.navy, 북구: C.bronze, 광산: C.emerald };
  return <span style={{ background: (colors[region]||C.slate)+"1A", color: colors[region]||C.slate }} className="text-[11px] font-bold px-2 py-0.5 rounded-md">{region}</span>;
}
function EmptyState({ text }) {
  return <div style={{ border: `1px dashed ${C.border}`, color: C.sub }} className="rounded-xl py-8 text-center text-sm">{text}</div>;
}


/* ===== 최상위 앱: 로그인 상태 관리 ===== */
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [labels, setLabels] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recoveryMode, setRecoveryMode] = useState(false);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supabase.auth.onAuthStateChange((event, sess) => {
      if (event === "PASSWORD_RECOVERY") setRecoveryMode(true);
      setSession(sess);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setProfile(null); setLoading(false); return; }
    (async () => {
      setLoading(true);
      const { data: p } = await supabase.from("profiles").select("*").eq("id", session.user.id).single();
      setProfile(p);
      const { data: labelRows } = await supabase.from("labels").select("*");
      const map = {};
      (labelRows||[]).forEach(l => map[l.role_key] = l);
      setLabels(map);
      setLoading(false);
    })();
  }, [session]);

  if (recoveryMode) return <ResetPasswordScreen onDone={() => setRecoveryMode(false)} />;
  if (loading && session) return <div style={{background:C.bg,minHeight:"100vh"}} />;
  if (!session || !profile) return <AuthScreen />;
  return <Dashboard profile={profile} labels={labels} />;
}

function ResetPasswordScreen({ onDone }) {
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [busy, setBusy] = useState(false);

  const save = async () => {
    if (password.length < 6) { setError("비밀번호는 6자 이상이어야 해요."); return; }
    setBusy(true); setError("");
    const { error } = await supabase.auth.updateUser({ password });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("비밀번호가 변경됐어요. 이제 이 비밀번호로 로그인하시면 돼요.");
  };

  return (
    <div style={{background:C.ink,minHeight:"100vh",fontFamily:FONT_BODY}} className="flex items-center justify-center px-5">
      <div style={{background:C.card}} className="w-full max-w-sm rounded-2xl p-6">
        <div className="text-lg font-extrabold mb-1" style={{color:C.navy}}>새 비밀번호 설정</div>
        <p style={{color:C.sub}} className="text-xs mb-5">새로 쓸 비밀번호를 입력해주세요.</p>
        <div className="flex flex-col gap-3">
          <Field label="새 비밀번호"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle} /></Field>
          {error && <div style={{color:"#C23B3B"}} className="text-xs font-semibold">{error}</div>}
          {notice ? (
            <>
              <div style={{color:C.emerald}} className="text-xs font-semibold">{notice}</div>
              <button onClick={onDone} style={{background:C.navy}} className="text-white font-bold py-3 rounded-xl mt-1">로그인 화면으로</button>
            </>
          ) : (
            <button onClick={save} disabled={busy} style={{background:C.emerald}} className="text-white font-bold py-3 rounded-xl mt-1">{busy?"저장 중...":"비밀번호 저장"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ===== 로그인 / 회원가입 ===== */
function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [role, setRole] = useState("ROLE_1");
  const [region, setRegion] = useState(REGIONS[0]);
  const [dept, setDept] = useState(DEPT_KEYS[0]);
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [busy, setBusy] = useState(false);

  const signIn = async () => {
    setError(""); setBusy(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) setError(error.message);
  };
  const signUp = async () => {
    setError(""); setNotice(""); setBusy(true);
    const { error } = await supabase.auth.signUp({ email, password, options: { data: { name, role, region, dept } } });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("가입 완료! 이메일 인증이 필요할 수 있어요. 인증 후 로그인해주세요.");
    setMode("signin");
  };
  const sendResetEmail = async () => {
    if (!email) { setError("비밀번호를 재설정할 이메일을 위에 먼저 입력해주세요."); return; }
    setError(""); setNotice(""); setBusy(true);
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("비밀번호 재설정 링크를 이메일로 보냈어요. 메일함을 확인해주세요.");
  };

  return (
    <div style={{background:C.ink,minHeight:"100vh",fontFamily:FONT_BODY}} className="flex items-center justify-center px-5">
      <div style={{background:C.card}} className="w-full max-w-sm rounded-3xl p-7">
        <div className="flex items-center gap-2.5 mb-1">
          <LogoMark />
          <div style={{color:C.ink,fontFamily:FONT_DISPLAY}} className="text-lg font-bold tracking-tight">실적 랭킹</div>
        </div>
        <div style={{background:C.bg}} className="flex gap-1 my-5 p-1 rounded-full">
          <button onClick={()=>setMode("signin")} style={{background:mode==="signin"?C.ink:"transparent",color:mode==="signin"?"#fff":C.sub}} className="flex-1 py-2 rounded-full text-sm font-bold">로그인</button>
          <button onClick={()=>setMode("signup")} style={{background:mode==="signup"?C.ink:"transparent",color:mode==="signup"?"#fff":C.sub}} className="flex-1 py-2 rounded-full text-sm font-bold">회원가입</button>
        </div>
        <div className="flex flex-col gap-3">
          <Field label="이메일"><input value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle} placeholder="you@example.com" /></Field>
          <Field label="비밀번호"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle} /></Field>
          {mode==="signup" && <>
            <Field label="이름"><input value={name} onChange={e=>setName(e.target.value)} style={inputStyle} /></Field>
            <Field label="역할"><select value={role} onChange={e=>setRole(e.target.value)} style={inputStyle}>{ROLE_KEYS.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
            <Field label="지역"><select value={region} onChange={e=>setRegion(e.target.value)} style={inputStyle}>{REGIONS.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
            <Field label="부서"><select value={dept} onChange={e=>setDept(e.target.value)} style={inputStyle}>{DEPT_KEYS.map(d=><option key={d} value={d}>{d}</option>)}</select></Field>
          </>}
          {error && <div style={{color:C.danger}} className="text-xs font-semibold">{error}</div>}
          {notice && <div style={{color:C.teal}} className="text-xs font-semibold">{notice}</div>}
          <button onClick={mode==="signin"?signIn:signUp} disabled={busy} style={{background:C.amber,color:C.ink}} className="font-bold py-3 rounded-full mt-1">
            {busy ? "처리 중..." : mode==="signin" ? "로그인" : "가입하기"}
          </button>
          {mode==="signin" && (
            <button onClick={sendResetEmail} disabled={busy} style={{color:C.sub}} className="text-xs text-center underline mt-1">
              비밀번호를 잊으셨나요?
            </button>
          )}
        </div>
        <div style={{color:C.sub,background:C.bg}} className="text-[11px] rounded-lg px-3 py-2 mt-4">
          총관리자 계정은 일반 가입 후 총관리자가 직접 권한을 바꿔줘야 해요.
        </div>
      </div>
    </div>
  );
}

/* ===== 대시보드 ===== */
function Dashboard({ profile, labels }) {
  const [activeRole, setActiveRole] = useState("ROLE_1");
  const [entries, setEntries] = useState([]);
  const [detailOwner, setDetailOwner] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBulk, setShowBulk] = useState(false);
  const [view, setView] = useState("top3");
  const [fetchError, setFetchError] = useState("");
  const [ownerNames, setOwnerNames] = useState({});
  const [refreshKey, setRefreshKey] = useState(0);

  const isAdmin = profile.role === "관리자";

  const ROLES = useMemo(() => {
    const out = {};
    ROLE_KEYS.forEach(k => out[k] = {
      label: labels?.[k]?.display_name || k,
      metricLabel: labels?.[k]?.metric_label || k,
      metricType: ROLE_METRIC_TYPE[k],
    });
    return out;
  }, [labels]);

  useEffect(() => {
    (async () => {
      setFetchError("");
      const { data, error } = await supabase.from("entries").select("*").eq("role", activeRole).order("created_at", { ascending: true });
      if (error) { setFetchError(error.message); setEntries([]); return; }
      setEntries(data || []);
    })();
  }, [activeRole, showForm, refreshKey]);

  useEffect(() => {
    (async () => {
      const ids = [...new Set(entries.map(e => e.owner_id).filter(Boolean))];
      if (ids.length === 0) return;
      const { data } = await supabase.from("profiles").select("id, name").in("id", ids);
      const map = {};
      (data||[]).forEach(p => map[p.id] = p.name);
      setOwnerNames(map);
    })();
  }, [entries]);

  const ranking = useMemo(() => {
    const grouped = {};
    entries.forEach(e => {
      const key = e.owner_id || ("name:" + e.owner_name);
      if (!grouped[key]) grouped[key] = { key, owner_id: e.owner_id, owner_name: e.owner_name, region: e.region, dept: e.dept, total: 0 };
      grouped[key].total += e.metric;
    });
    return Object.values(grouped).sort((a,b)=>b.total-a.total);
  }, [entries]);
  const displayName = (row) => (row.owner_id ? ownerNames[row.owner_id] : row.owner_name) || "";

  const top3 = ranking.slice(0,3);
  const rest = ranking.slice(3);
  const detailRow = ranking.find(r => r.key === detailOwner);
  const detailEntries = detailOwner ? entries.filter(e => (e.owner_id || ("name:"+e.owner_name)) === detailOwner) : [];
  const canSeeDetail = isAdmin || (detailRow && detailRow.owner_id === profile.id);
  const logout = () => supabase.auth.signOut();

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT_BODY,color:C.text}}>
      <div style={{background:C.ink}} className="px-5 pt-5 pb-0">
        <div className="flex items-center justify-between max-w-3xl mx-auto pb-5">
          <div className="flex items-center gap-2.5">
            <LogoMark />
            <div>
              <div style={{color:"#fff",fontFamily:FONT_DISPLAY}} className="text-[15px] font-bold leading-none tracking-tight">실적 랭킹</div>
              <div style={{color:"#7C8399"}} className="text-[11px] mt-1">
                {isAdmin ? "총관리자" : `${ROLES[profile.role]?.label} · ${maskName(profile.name)}`}
              </div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {!isAdmin && <button onClick={()=>setShowForm(true)} style={{background:C.amber,color:C.ink}} className="flex items-center gap-1 text-xs font-bold px-3.5 py-2 rounded-full">＋ 실적 등록</button>}
            {isAdmin && <button onClick={()=>setShowBulk(true)} style={{background:C.amber,color:C.ink}} className="flex items-center gap-1 text-xs font-bold px-3.5 py-2 rounded-full">📋 일괄 등록</button>}
            <button onClick={logout} style={{color:"#8890A3",border:`1px solid ${C.inkLine}`}} className="text-xs px-3 py-2 rounded-full">로그아웃</button>
          </div>
        </div>
        <div className="max-w-3xl mx-auto flex gap-6">
          {ROLE_KEYS.map(r => (
            <button key={r} onClick={()=>{setActiveRole(r);setDetailOwner(null);}} className="pb-3 text-[13px] font-bold"
              style={{color:activeRole===r?"#fff":"#5B6172", borderBottom:activeRole===r?`2px solid ${C.amber}`:"2px solid transparent"}}>{ROLES[r].label}</button>
          ))}
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-5 py-6">
        {!isAdmin && (
          <div style={{background:C.tealSoft,border:`1px solid ${C.teal}22`}} className="rounded-xl px-4 py-3 mb-5 flex items-center gap-2">
            <span>🔒</span>
            <span style={{color:C.ink}} className="text-xs">본인이 등록한 기록만 상세 조회할 수 있어요. 다른 사람의 상세 기록은 총관리자만 볼 수 있습니다.</span>
          </div>
        )}
        {fetchError && <div style={{background:"#FDEDED",color:C.danger}} className="rounded-xl px-4 py-3 mb-5 text-xs">{fetchError}</div>}

        <div className="flex items-center justify-between mb-1.5">
          <div style={{color:C.teal,fontFamily:FONT_DISPLAY}} className="text-[11px] font-bold tracking-wide">{ROLES[activeRole].label.toUpperCase()} · 2026.07</div>
          <div style={{background:C.card,border:`1px solid ${C.border}`}} className="flex rounded-full overflow-hidden p-0.5">
            <button onClick={()=>setView("top3")} className="text-[11px] font-bold px-3 py-1.5 rounded-full" style={{background:view==="top3"?C.ink:"transparent",color:view==="top3"?"#fff":C.sub}}>TOP3</button>
            <button onClick={()=>setView("all")} className="text-[11px] font-bold px-3 py-1.5 rounded-full" style={{background:view==="all"?C.ink:"transparent",color:view==="all"?"#fff":C.sub}}>전체 순위</button>
          </div>
        </div>
        <h1 style={{color:C.ink,fontFamily:FONT_DISPLAY}} className="text-2xl font-bold mb-5 tracking-tight">
          {ROLES[activeRole].metricLabel} {view==="top3" ? `TOP ${Math.min(3,top3.length)}` : `전체 ${ranking.length}명`}
        </h1>

        {ranking.length===0 && <EmptyState text={`아직 ${ROLES[activeRole].label} 등록 기록이 없어요.`} />}

        {view==="top3" && ranking.length>0 && <>
          <div className="flex flex-col gap-2.5 mb-7">
            {top3.map((row,i)=>(
              <ScoreRow key={row.key} rank={i+1} row={row} name={maskName(displayName(row))}
                metricLabel={ROLES[activeRole].metricLabel} maxValue={top3[0].total || 1}
                big={i===0} onClick={()=>setDetailOwner(row.key)} />
            ))}
          </div>
          {rest.length>0 && <>
            <h2 style={{color:C.ink,fontFamily:FONT_DISPLAY}} className="text-xs font-bold mb-3 tracking-wide">4 – {ranking.length}위</h2>
            <RankList rows={rest} startRank={4} displayName={displayName} onSelect={setDetailOwner} maxValue={top3[0].total || 1} />
          </>}
        </>}
        {view==="all" && ranking.length>0 && <RankList rows={ranking} startRank={1} displayName={displayName} onSelect={setDetailOwner} highlightTop3 maxValue={ranking[0].total || 1} />}
      </div>

      {detailOwner && (
        <DetailModal
          owner={displayName(detailRow || {})}
          region={detailRow?.region}
          dept={detailRow?.dept}
          roleLabel={ROLES[activeRole].label}
          entries={detailEntries}
          allowed={canSeeDetail}
          isAdmin={isAdmin}
          onClose={()=>setDetailOwner(null)}
          onChanged={()=>setRefreshKey(k=>k+1)}
        />
      )}
      {showForm && <EntryForm profile={profile} roles={ROLES} onClose={()=>setShowForm(false)} onSubmitted={()=>setShowForm(false)} />}
      {showBulk && <BulkEntryForm roles={ROLES} onClose={()=>setShowBulk(false)} onSaved={()=>setRefreshKey(k=>k+1)} />}
    </div>
  );
}

function LogoMark() {
  return (
    <svg width="30" height="30" viewBox="0 0 30 30" style={{flexShrink:0}}>
      <rect width="30" height="30" rx="8" fill={C.amber} />
      <rect x="8" y="17" width="3.4" height="7" rx="1" fill={C.ink} />
      <rect x="13.3" y="12" width="3.4" height="12" rx="1" fill={C.ink} />
      <rect x="18.6" y="6" width="3.4" height="18" rx="1" fill={C.ink} />
    </svg>
  );
}

function ScoreRow({ rank, row, name, metricLabel, maxValue, big, onClick }) {
  const tone = rank===1 ? { bar:C.amber, chip:C.amber, chipText:C.ink } : rank===2 ? { bar:C.steel, chip:C.steelSoft, chipText:C.text } : { bar:C.copper, chip:C.copperSoft, chipText:C.text };
  const pct = Math.max(6, Math.round((row.total / (maxValue||1)) * 100));
  return (
    <button onClick={onClick} style={{background:C.card,border:`1px solid ${C.border}`}} className={`w-full text-left rounded-2xl overflow-hidden ${big?"px-5 pt-4 pb-4":"px-4 pt-3 pb-3"}`}>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2.5">
          <span style={{background:tone.chip,color:tone.chipText,fontFamily:FONT_DISPLAY}} className={`flex items-center justify-center rounded-lg font-bold ${big?"w-8 h-8 text-base":"w-6 h-6 text-xs"}`}>{rank}</span>
          <div>
            <div className="flex items-center gap-1.5 mb-0.5"><RegionTag region={row.region} /><span style={{color:C.sub}} className="text-[11px] font-semibold">{deptLabel(row.dept)}</span></div>
            <div style={{color:C.ink}} className={`font-extrabold ${big?"text-lg":"text-[15px]"}`}>{name}</div>
          </div>
        </div>
        <div style={{fontFamily:FONT_DISPLAY,color:C.ink}} className={`font-bold ${big?"text-2xl":"text-lg"}`}>{row.total}<span style={{color:C.sub}} className="text-[10px] font-semibold ml-1">{metricLabel}</span></div>
      </div>
      <div style={{background:C.bg, height: big?8:6}} className="w-full rounded-full overflow-hidden">
        <div style={{background:tone.bar, width:`${pct}%`, height:"100%"}} className="rounded-full" />
      </div>
    </button>
  );
}

function RankList({ rows, startRank, displayName, onSelect, highlightTop3, maxValue }) {
  return (
    <div className="flex flex-col gap-2">
      {rows.map((row,i)=>{
        const rank = startRank+i;
        const isTop = highlightTop3 && rank<=3;
        const tone = rank===1 ? C.amber : rank===2 ? C.steel : rank===3 ? C.copper : C.teal;
        const pct = Math.max(4, Math.round((row.total / (maxValue||1)) * 100));
        return (
          <button key={row.key} onClick={()=>onSelect(row.key)} style={{background:C.card,border:`1px solid ${C.border}`}} className="w-full text-left rounded-xl px-4 py-2.5">
            <div className="flex items-center justify-between mb-1.5">
              <div className="flex items-center gap-2.5">
                <span style={{color:isTop?"#fff":C.sub,background:isTop?tone:C.bg,fontFamily:FONT_DISPLAY}} className="text-[11px] font-bold w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0">{rank}</span>
                <RegionTag region={row.region} />
                <span className="text-[13px] font-bold" style={{color:C.text}}>{maskName(displayName(row))}</span>
                <span style={{color:C.sub}} className="text-[11px]">{deptLabel(row.dept)}</span>
              </div>
              <span style={{color:C.ink,fontFamily:FONT_DISPLAY}} className="text-[13px] font-bold">{row.total}</span>
            </div>
            <div style={{background:C.bg,height:4}} className="w-full rounded-full overflow-hidden">
              <div style={{background:tone, width:`${pct}%`, height:"100%"}} className="rounded-full" />
            </div>
          </button>
        );
      })}
    </div>
  );
}

function DetailModal({ owner, region, dept, roleLabel, entries, allowed, isAdmin, onClose, onChanged }) {
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editPhone, setEditPhone] = useState("");
  const [busyId, setBusyId] = useState(null);

  const startEdit = (e) => {
    setEditingId(e.id);
    setEditName(e.target_name);
    setEditPhone(e.phone_masked);
  };

  const saveEdit = async (id) => {
    setBusyId(id);
    const { error } = await supabase.from("entries").update({ target_name: editName, phone_masked: editPhone }).eq("id", id);
    setBusyId(null);
    if (!error) { setEditingId(null); onChanged(); }
  };

  const deleteEntry = async (id) => {
    if (!window.confirm("이 기록을 삭제할까요? 되돌릴 수 없어요.")) return;
    setBusyId(id);
    const { error } = await supabase.from("entries").delete().eq("id", id);
    setBusyId(null);
    if (!error) onChanged();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-md rounded-t-2xl md:rounded-2xl max-h-[85vh] flex flex-col overflow-hidden">
        <div style={{background:C.card,borderBottom:`1px solid ${C.border}`}} className="flex items-start justify-between px-5 py-4 flex-shrink-0">
          <div>
            <div className="flex items-center gap-2 mb-1"><RegionTag region={region} /><span style={{color:C.sub}} className="text-xs font-semibold">{deptLabel(dept)}</span></div>
            <div className="text-lg font-extrabold" style={{color:C.navy}}>{maskName(owner)} <span style={{color:C.sub}} className="text-xs font-medium">· {roleLabel}</span></div>
          </div>
          <button onClick={onClose} style={{background:C.bg}} className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">✕</button>
        </div>
        <div className="overflow-y-auto px-5 py-4">
          {!allowed ? (
            <div style={{border:`1px solid ${C.border}`}} className="rounded-xl py-8 text-center px-4">
              <div className="mb-2">🔒</div>
              <div style={{color:C.sub}} className="text-sm">다른 사람의 상세 기록은 총관리자만 볼 수 있어요.</div>
            </div>
          ) : (
            <div className="flex flex-col gap-2">
              <div style={{color:C.sub}} className="text-xs font-semibold mb-1">총 {entries.length}건</div>
              {entries.map(e=>(
                <div key={e.id} style={{border:`1px solid ${C.border}`}} className="rounded-lg px-3 py-2.5">
                  {editingId === e.id ? (
                    <div className="flex flex-col gap-2">
                      <input value={editName} onChange={ev=>setEditName(ev.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}} placeholder="이름(마스킹된 값)" />
                      <input value={editPhone} onChange={ev=>setEditPhone(ev.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}} placeholder="010-XXXX-0000" />
                      <div className="flex gap-2">
                        <button onClick={()=>saveEdit(e.id)} disabled={busyId===e.id} style={{background:C.emerald}} className="flex-1 text-white text-xs font-bold py-1.5 rounded-lg">저장</button>
                        <button onClick={()=>setEditingId(null)} style={{background:C.bg,color:C.sub}} className="flex-1 text-xs font-bold py-1.5 rounded-lg">취소</button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="text-sm font-semibold" style={{color:C.text}}>{e.target_name || "(대상자 정보 없음, 일괄등록)"}</div>
                        <div style={{color:C.sub}} className="text-xs font-mono">{e.phone_masked}</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="text-right">
                          <div style={{color:C.emerald}} className="text-sm font-bold">{e.metric}</div>
                          <div style={{color:C.sub}} className="text-[11px]">{new Date(e.created_at).toISOString().slice(0,10)}</div>
                        </div>
                        {isAdmin && (
                          <div className="flex flex-col gap-1 ml-1">
                            <button onClick={()=>startEdit(e)} style={{color:C.slate}} className="text-[11px] font-semibold">수정</button>
                            <button onClick={()=>deleteEntry(e.id)} disabled={busyId===e.id} style={{color:"#C23B3B"}} className="text-[11px] font-semibold">삭제</button>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{borderTop:`1px solid ${C.border}`}} className="px-5 py-3 flex-shrink-0">
          <button onClick={onClose} style={{background:C.navy}} className="w-full text-white font-bold py-2.5 rounded-xl text-sm">뒤로가기</button>
        </div>
      </div>
    </div>
  );
}

function BulkEntryForm({ roles, onClose, onSaved }) {
  const [role, setRole] = useState("ROLE_1");
  const [rawText, setRawText] = useState("");
  const [rows, setRows] = useState(null);
  const [headers, setHeaders] = useState([]);
  const [mapRegion, setMapRegion] = useState("");
  const [mapDept, setMapDept] = useState("");
  const [mapName, setMapName] = useState("");
  const [mapTarget, setMapTarget] = useState("");
  const [mapPhone, setMapPhone] = useState("");
  const [mapValue, setMapValue] = useState(""); // 선택: 없으면 전부 1건씩
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const splitLine = (line, delim) => delim === "ws" ? line.trim().split(/\s+/) : line.split(delim);

  const parseText = () => {
    const lines = rawText.trim().split("\n").filter(l => l.trim());
    if (lines.length < 1) { setMsg("데이터를 1줄 이상 입력해주세요."); return; }
    const delim = lines[0].includes("\t") ? "\t" : lines[0].includes(",") ? "," : lines[0].includes("/") ? "/" : "ws";
    const parsedLines = lines.map(l => splitLine(l, delim).map(c => c.trim()));
    const maxCols = Math.max(...parsedLines.map(l => l.length));
    const head = Array.from({ length: maxCols }, (_, i) => `열${i+1}`);
    const data = parsedLines.map(cells => {
      const obj = {};
      head.forEach((h,i) => obj[h] = cells[i] || "");
      return obj;
    });
    setHeaders(head); setRows(data);
    setMapRegion(head[0]||""); setMapDept(head[1]||""); setMapName(head[2]||""); setMapTarget(head[3]||""); setMapPhone(head[4]||"");
    setMsg(`✅ ${data.length}행 인식 완료! 아래에서 열 매칭을 확인해주세요.`);
  };

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: "binary" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (json.length === 0) { setMsg("파일에서 데이터를 읽지 못했어요."); return; }
      const head = Object.keys(json[0]);
      setHeaders(head);
      setRows(json.map(r => { const o={}; head.forEach(h=>o[h]=String(r[h]??"")); return o; }));
      setMapRegion(head[0]||""); setMapDept(head[1]||""); setMapName(head[2]||""); setMapTarget(head[3]||""); setMapPhone(head[4]||"");
      setMsg("");
    };
    reader.readAsBinaryString(file);
  };

  const save = async () => {
    if (!rows || !mapName) return;
    setBusy(true); setMsg("");
    const payload = rows.map(r => ({
      role,
      region: mapRegion ? r[mapRegion] : null,
      dept: mapDept ? r[mapDept] : null,
      owner_name: maskName(r[mapName] || ""),
      target_name: mapTarget ? maskName(r[mapTarget] || "") : null,
      phone_masked: mapPhone ? maskPhone(r[mapPhone]) : null,
      metric: mapValue ? (Number(r[mapValue]) || 1) : 1,
    })).filter(r => r.owner_name);

    const { error } = await supabase.from("entries").insert(payload);
    setBusy(false);
    if (error) { setMsg("저장 실패: " + error.message); return; }
    setMsg(`✅ ${payload.length}건 저장 완료!`);
    setRows(null); setRawText("");
    onSaved();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-lg rounded-t-2xl md:rounded-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="text-lg font-extrabold" style={{color:C.navy}}>일괄 등록</div>
          <button onClick={onClose}>✕</button>
        </div>

        <Field label="적용할 역할">
          <select value={role} onChange={e=>setRole(e.target.value)} style={inputStyle}>
            {Object.keys(roles).map(k => <option key={k} value={k}>{roles[k].label}</option>)}
          </select>
        </Field>

        <div className="mt-4">
          <div style={{color:C.sub}} className="text-xs font-semibold mb-1">데이터를 바로 붙여넣기 (제목 줄 없이, 탭/쉼표/슬래시/공백 구분 다 인식돼요)</div>
          <div style={{background:C.bg,color:C.navy}} className="text-xs font-semibold rounded-lg px-3 py-2 mb-2">
            순서(고정): 직원 지역 / 직원 부서 / 직원 이름 / 대상자(프루트) 이름 / 번호
            <div style={{color:C.sub}} className="font-normal font-mono mt-1">예시) 본부/1팀/홍길동/이서준/010-1111-2222</div>
          </div>
          <textarea value={rawText} onChange={e=>setRawText(e.target.value)} rows={5} style={{...inputStyle, fontFamily:"monospace"}} placeholder={"여기에 데이터를 붙여넣으세요"} />
          <button onClick={parseText} style={{background:C.slate}} className="text-white text-xs font-bold px-4 py-2 rounded-lg mt-2">텍스트 불러오기</button>
        </div>

        <div className="mt-4">
          <div style={{color:C.sub}} className="text-xs font-semibold mb-1">또는 파일 업로드 (csv / xlsx)</div>
          <input type="file" accept=".csv,.xlsx,.xls" onChange={e=>e.target.files[0] && handleFile(e.target.files[0])} />
        </div>

        {msg && (
          <div style={{color: msg.includes("실패")||msg.includes("필요") ? "#C23B3B" : C.emerald}} className="text-xs font-semibold mt-3">{msg}</div>
        )}

        {rows && (
          <div className="mt-5">
            <div className="font-bold mb-2 text-sm" style={{color:C.navy}}>열 매칭 확인 ({rows.length}행)</div>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <Field label="직원 지역 열"><select value={mapRegion} onChange={e=>setMapRegion(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="직원 부서 열"><select value={mapDept} onChange={e=>setMapDept(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="직원 이름 열 (필수)"><select value={mapName} onChange={e=>setMapName(e.target.value)} style={inputStyle}>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="대상자(프루트) 이름 열 (선택)"><select value={mapTarget} onChange={e=>setMapTarget(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="번호 열 (대상자 번호, 선택)"><select value={mapPhone} onChange={e=>setMapPhone(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="값(건수) 열 - 없으면 1건씩"><select value={mapValue} onChange={e=>setMapValue(e.target.value)} style={inputStyle}><option value="">(없음, 1건씩)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
            </div>
            <div className="max-h-40 overflow-y-auto border rounded-lg" style={{borderColor:C.border}}>
              <table className="w-full text-xs">
                <thead style={{background:C.bg}}><tr>{headers.map(h=><th key={h} className="text-left px-2 py-1.5">{h}</th>)}</tr></thead>
                <tbody>{rows.slice(0,15).map((r,i)=>(<tr key={i} className="border-t" style={{borderColor:C.border}}>{headers.map(h=><td key={h} className="px-2 py-1.5">{r[h]}</td>)}</tr>))}</tbody>
              </table>
            </div>
            <button onClick={save} disabled={busy} style={{background:C.emerald}} className="text-white font-bold py-3 rounded-xl mt-3 w-full">{busy?"저장 중...":`${rows.length}건 저장하기`}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function EntryForm({ profile, roles, onClose, onSubmitted }) {
  const [dept, setDept] = useState(profile.dept || DEPT_KEYS[0]);
  const [region, setRegion] = useState(profile.region || REGIONS[0]);
  const [targetName, setTargetName] = useState("");
  const [phone, setPhone] = useState("");
  const [metric, setMetric] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const role = profile.role;
  const isManual = roles[role]?.metricType === "manual";

  const submit = async () => {
    if (!targetName || !phone) return;
    setBusy(true); setError("");
    const { error } = await supabase.from("entries").insert({
      owner_id: profile.id, role, region, dept,
      target_name: maskName(targetName), // 원본은 저장하지 않고 마스킹된 값만 저장
      phone_masked: maskPhone(phone),
      metric: isManual ? Number(metric||0) : 1,
    });
    setBusy(false);
    if (error) { setError(error.message); return; }
    onSubmitted();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-md rounded-t-2xl md:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="text-lg font-extrabold" style={{color:C.navy}}>실적 등록 · {roles[role]?.label}</div>
          <button onClick={onClose}>✕</button>
        </div>
        <div className="flex flex-col gap-3">
          <Field label="지역"><select value={region} onChange={e=>setRegion(e.target.value)} style={inputStyle}>{REGIONS.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
          <Field label="부서"><select value={dept} onChange={e=>setDept(e.target.value)} style={inputStyle}>{DEPT_KEYS.map(d=><option key={d} value={d}>{d}</option>)}</select></Field>
          <Field label="본인 이름"><input value={profile.name} disabled style={{...inputStyle,color:C.sub,background:C.bg}} /></Field>
          <Field label="프루트 이름"><input value={targetName} onChange={e=>setTargetName(e.target.value)} style={inputStyle} /></Field>
          <Field label="번호"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" style={inputStyle} /></Field>
          <div style={{color:C.sub,background:C.bg}} className="text-[11px] rounded-lg px-3 py-2">
            이름·번호는 원본을 저장하지 않고, 등록 즉시 마스킹된 값만 저장돼요. 총관리자를 포함해 아무도 원본을 다시 볼 수 없고, 식별용 참고 정보로만 쓰입니다.
          </div>
          {error && <div style={{color:"#C23B3B"}} className="text-xs font-semibold">{error}</div>}
          <button onClick={submit} disabled={busy} style={{background:C.emerald}} className="text-white font-bold py-3 rounded-xl mt-1">{busy?"등록 중...":"등록하기"}</button>
        </div>
      </div>
    </div>
  );
}
