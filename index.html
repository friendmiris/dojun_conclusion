<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>총관리자 데이터 입력 도구</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const SUPABASE_URL = "https://qhsjzahnqopgtjgsmhro.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoc2p6YWhucW9wZ3RqZ3NtaHJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjAxODIsImV4cCI6MjA5OTU5NjE4Mn0.X9hLFAJ5AtS3OkiCBmnXN5a7m_k7InkL-TPOwPCjQkQ";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const C = {
  navy: "#16223D", slate: "#2E4374", emerald: "#1F9463", emeraldSoft: "#E6F5EE",
  gold: "#C9971F", goldSoft: "#FBF1DC", silver: "#8D97A6", silverSoft: "#EEF0F3",
  bronze: "#B0692E", bronzeSoft: "#F6E7DA", bg: "#F4F5F9", card: "#FFFFFF",
  text: "#1B1F2A", sub: "#6B7280", border: "#E6E8EF",
};
const inputStyle = { width: "100%", border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, outline: "none" };
function Field({ label, children }) {
  return <div><div style={{ color: C.sub }} className="text-xs font-semibold mb-1">{label}</div>{children}</div>;
}
const RANK_STYLE = { 1:{medalBg:C.gold,soft:C.goldSoft}, 2:{medalBg:C.silver,soft:C.silverSoft}, 3:{medalBg:C.bronze,soft:C.bronzeSoft} };
const MEDAL = { 1:"🥇", 2:"🥈", 3:"🥉" };

/* ===== 최상위: 로그인 + 관리자 체크 ===== */
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supabase.auth.onAuthStateChange((_e, sess) => setSession(sess));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setProfile(null); setLoading(false); return; }
    (async () => {
      setLoading(true);
      const { data } = await supabase.from("profiles").select("*").eq("id", session.user.id).single();
      setProfile(data);
      setLoading(false);
    })();
  }, [session]);

  if (loading && session) return <div style={{background:C.bg,minHeight:"100vh"}} />;
  if (!session) return <LoginScreen />;
  if (!profile || profile.role !== "관리자") return <NoAccess />;
  return <AdminTool />;
}

function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const signIn = async () => {
    setError(""); setBusy(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) setError(error.message);
  };
  return (
    <div style={{background:C.navy,minHeight:"100vh"}} className="flex items-center justify-center px-5">
      <div style={{background:C.card}} className="w-full max-w-sm rounded-2xl p-6">
        <div className="text-lg font-extrabold mb-4" style={{color:C.navy}}>🔐 총관리자 로그인</div>
        <div className="flex flex-col gap-3">
          <Field label="이메일"><input value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle} /></Field>
          <Field label="비밀번호"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle} /></Field>
          {error && <div style={{color:"#C23B3B"}} className="text-xs font-semibold">{error}</div>}
          <button onClick={signIn} disabled={busy} style={{background:C.emerald}} className="text-white font-bold py-3 rounded-xl mt-1">{busy?"확인 중...":"로그인"}</button>
        </div>
      </div>
    </div>
  );
}

function NoAccess() {
  return (
    <div style={{background:C.bg,minHeight:"100vh"}} className="flex items-center justify-center px-5">
      <div style={{background:C.card,border:`1px solid ${C.border}`}} className="rounded-2xl p-6 text-center max-w-sm">
        <div className="text-2xl mb-2">🔒</div>
        <div className="font-bold mb-1" style={{color:C.navy}}>총관리자 전용 도구예요</div>
        <div style={{color:C.sub}} className="text-sm">이 계정은 총관리자 권한이 없어요.</div>
        <button onClick={()=>supabase.auth.signOut()} style={{background:C.navy}} className="text-white text-xs font-bold px-4 py-2 rounded-lg mt-4">로그아웃</button>
      </div>
    </div>
  );
}

/* ===== 본체: 업로드 + 순위 보기 ===== */
function AdminTool() {
  const [tab, setTab] = useState("upload"); // upload | view
  const [rawText, setRawText] = useState("");
  const [rows, setRows] = useState(null);       // 파싱된 원본 rows (array of objects)
  const [headers, setHeaders] = useState([]);
  const [mapCategory, setMapCategory] = useState("");
  const [mapName, setMapName] = useState("");
  const [mapValue, setMapValue] = useState("");
  const [saveMsg, setSaveMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const [categories, setCategories] = useState([]);
  const [activeCategory, setActiveCategory] = useState(null);
  const [rankRows, setRankRows] = useState([]);

  /* ---- 텍스트 붙여넣기 파싱 ---- */
  const parseText = () => {
    const lines = rawText.trim().split("\n").filter(l => l.trim());
    if (lines.length < 2) { setSaveMsg("최소 헤더 1줄 + 데이터 1줄 이상 필요해요."); return; }
    const delim = lines[0].includes("\t") ? "\t" : ",";
    const head = lines[0].split(delim).map(h => h.trim());
    const data = lines.slice(1).map(line => {
      const cells = line.split(delim);
      const obj = {};
      head.forEach((h,i) => obj[h] = (cells[i]||"").trim());
      return obj;
    });
    setHeaders(head);
    setRows(data);
    setMapCategory(head[0]||""); setMapName(head[1]||""); setMapValue(head[2]||"");
    setSaveMsg("");
  };

  /* ---- 파일 업로드 파싱 (csv/xlsx) ---- */
  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: "binary" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (json.length === 0) { setSaveMsg("파일에서 데이터를 읽지 못했어요."); return; }
      const head = Object.keys(json[0]);
      setHeaders(head);
      setRows(json.map(r => { const o={}; head.forEach(h=>o[h]=String(r[h]??"")); return o; }));
      setMapCategory(head[0]||""); setMapName(head[1]||""); setMapValue(head[2]||"");
      setSaveMsg("");
    };
    reader.readAsBinaryString(file);
  };

  /* ---- 저장 ---- */
  const save = async () => {
    if (!rows || !mapCategory || !mapName || !mapValue) return;
    setBusy(true); setSaveMsg("");
    const { data: { user } } = await supabase.auth.getUser();
    const payload = rows.map(r => ({
      category: r[mapCategory],
      item_name: r[mapName],
      value: Number(r[mapValue]) || 0,
      created_by: user.id,
    })).filter(r => r.category && r.item_name);

    const { error } = await supabase.from("custom_rankings").insert(payload);
    setBusy(false);
    if (error) { setSaveMsg("저장 실패: " + error.message); return; }
    setSaveMsg(`${payload.length}건 저장 완료!`);
    setRows(null); setRawText("");
  };

  /* ---- 보기 탭: 카테고리 목록 불러오기 ---- */
  useEffect(() => {
    if (tab !== "view") return;
    (async () => {
      const { data } = await supabase.from("custom_rankings").select("category");
      const uniq = [...new Set((data||[]).map(d=>d.category))].sort();
      setCategories(uniq);
      if (uniq.length && !activeCategory) setActiveCategory(uniq[0]);
    })();
  }, [tab]);

  useEffect(() => {
    if (!activeCategory) return;
    (async () => {
      const { data } = await supabase.from("custom_rankings").select("*").eq("category", activeCategory).order("value", { ascending: false });
      setRankRows(data || []);
    })();
  }, [activeCategory, tab]);

  const deleteRow = async (id) => {
    if (!window.confirm("삭제할까요?")) return;
    await supabase.from("custom_rankings").delete().eq("id", id);
    setRankRows(prev => prev.filter(r => r.id !== id));
  };

  const clearCategory = async () => {
    if (!window.confirm(`"${activeCategory}" 카테고리 전체를 삭제할까요? 되돌릴 수 없어요.`)) return;
    await supabase.from("custom_rankings").delete().eq("category", activeCategory);
    setRankRows([]);
    setCategories(prev => prev.filter(c => c !== activeCategory));
    setActiveCategory(null);
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Pretendard','Noto Sans KR',sans-serif",color:C.text}}>
      <div style={{background:C.navy}} className="px-5 py-4">
        <div className="max-w-3xl mx-auto flex items-center justify-between">
          <div style={{color:"#fff"}} className="text-sm font-bold">📊 총관리자 데이터 입력 도구</div>
          <button onClick={()=>supabase.auth.signOut()} style={{color:"#93A0C2",border:"1px solid #2C3B60"}} className="text-xs px-3 py-2 rounded-lg">로그아웃</button>
        </div>
        <div className="max-w-3xl mx-auto flex gap-1 mt-4">
          <button onClick={()=>setTab("upload")} className="px-4 py-2 text-sm font-semibold rounded-t-lg" style={{background:tab==="upload"?C.bg:"transparent",color:tab==="upload"?C.navy:"#93A0C2"}}>데이터 입력</button>
          <button onClick={()=>setTab("view")} className="px-4 py-2 text-sm font-semibold rounded-t-lg" style={{background:tab==="view"?C.bg:"transparent",color:tab==="view"?C.navy:"#93A0C2"}}>순위 보기</button>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-5 py-6">
        {tab === "upload" && (
          <div className="flex flex-col gap-5">
            <div style={{background:C.card,border:`1px solid ${C.border}`}} className="rounded-xl p-5">
              <div className="font-bold mb-2" style={{color:C.navy}}>1. 텍스트로 붙여넣기</div>
              <p style={{color:C.sub}} className="text-xs mb-2">엑셀에서 표를 복사해서 그대로 붙여넣으면 돼요 (첫 줄은 항목 이름 — 예: 분류, 이름, 값).</p>
              <textarea value={rawText} onChange={e=>setRawText(e.target.value)} rows={6} style={{...inputStyle, fontFamily:"monospace"}} placeholder={"분류\t이름\t값\nA\t홍길동\t120\nA\t김철수\t95\nB\t이영희\t80"} />
              <button onClick={parseText} style={{background:C.slate}} className="text-white text-xs font-bold px-4 py-2 rounded-lg mt-2">텍스트 불러오기</button>
            </div>

            <div style={{background:C.card,border:`1px solid ${C.border}`}} className="rounded-xl p-5">
              <div className="font-bold mb-2" style={{color:C.navy}}>2. 또는 파일 업로드 (csv / xlsx)</div>
              <input type="file" accept=".csv,.xlsx,.xls" onChange={e=>e.target.files[0] && handleFile(e.target.files[0])} />
            </div>

            {rows && (
              <div style={{background:C.card,border:`1px solid ${C.border}`}} className="rounded-xl p-5">
                <div className="font-bold mb-3" style={{color:C.navy}}>3. 열 매칭 확인 ({rows.length}행 인식됨)</div>
                <div className="grid grid-cols-3 gap-3 mb-4">
                  <Field label="분류(카테고리) 열">
                    <select value={mapCategory} onChange={e=>setMapCategory(e.target.value)} style={inputStyle}>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select>
                  </Field>
                  <Field label="이름 열">
                    <select value={mapName} onChange={e=>setMapName(e.target.value)} style={inputStyle}>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select>
                  </Field>
                  <Field label="순위 매길 값(숫자) 열">
                    <select value={mapValue} onChange={e=>setMapValue(e.target.value)} style={inputStyle}>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select>
                  </Field>
                </div>
                <div className="max-h-48 overflow-y-auto border rounded-lg" style={{borderColor:C.border}}>
                  <table className="w-full text-xs">
                    <thead style={{background:C.bg}}><tr>{headers.map(h=><th key={h} className="text-left px-2 py-1.5">{h}</th>)}</tr></thead>
                    <tbody>
                      {rows.slice(0,20).map((r,i)=>(
                        <tr key={i} className="border-t" style={{borderColor:C.border}}>
                          {headers.map(h=><td key={h} className="px-2 py-1.5">{r[h]}</td>)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {rows.length > 20 && <div style={{color:C.sub}} className="text-[11px] mt-1">...외 {rows.length-20}행 더 (미리보기는 20행까지만 표시)</div>}
                {saveMsg && <div style={{color: saveMsg.includes("실패")?"#C23B3B":C.emerald}} className="text-xs font-semibold mt-3">{saveMsg}</div>}
                <button onClick={save} disabled={busy} style={{background:C.emerald}} className="text-white font-bold py-3 rounded-xl mt-3 w-full">{busy?"저장 중...":`${rows.length}건 저장하기`}</button>
              </div>
            )}
          </div>
        )}

        {tab === "view" && (
          <div>
            {categories.length === 0 ? (
              <div style={{border:`1px dashed ${C.border}`,color:C.sub}} className="rounded-xl py-8 text-center text-sm">아직 저장된 데이터가 없어요. "데이터 입력" 탭에서 먼저 넣어주세요.</div>
            ) : (
              <>
                <div className="flex gap-1 mb-4 flex-wrap">
                  {categories.map(c => (
                    <button key={c} onClick={()=>setActiveCategory(c)} className="px-3 py-1.5 rounded-lg text-sm font-semibold" style={{background:activeCategory===c?C.navy:C.card,color:activeCategory===c?"#fff":C.sub,border:`1px solid ${C.border}`}}>{c}</button>
                  ))}
                </div>
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-lg font-extrabold" style={{color:C.navy}}>{activeCategory} 순위 ({rankRows.length}건)</h2>
                  <button onClick={clearCategory} style={{color:"#C23B3B"}} className="text-xs font-semibold">이 분류 전체 삭제</button>
                </div>
                <div style={{background:C.card,border:`1px solid ${C.border}`}} className="rounded-xl divide-y">
                  {rankRows.map((r,i) => {
                    const rank = i+1;
                    const medal = RANK_STYLE[rank];
                    return (
                      <div key={r.id} className="flex items-center justify-between px-4 py-3">
                        <div className="flex items-center gap-3">
                          <span style={{color:medal?"#fff":C.sub,background:medal?medal.medalBg:"transparent"}} className="text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0">{medal?MEDAL[rank]:rank}</span>
                          <span className="text-sm font-semibold">{r.item_name}</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <span style={{color:C.emerald}} className="text-sm font-bold">{r.value}</span>
                          <button onClick={()=>deleteRow(r.id)} style={{color:C.sub}} className="text-xs">삭제</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
