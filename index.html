/* ===== 마스킹 ===== */
function maskName(name) {
  if (!name) return "";
  const chars = Array.from(name.trim());
  if (chars.length <= 1) return chars.join("");
  if (chars.length === 2) return chars[0] + "ㅇ";
  return chars[0] + "ㅇ".repeat(chars.length - 2) + chars[chars.length - 1];
}
function maskPhone(phone) {
  if (!phone) return "";
  const digits = phone.replace(/[^0-9]/g, "");
  if (digits.length === 11) return `${digits.slice(0,3)}-XXXX-${digits.slice(7)}`;
  if (digits.length === 10) return `${digits.slice(0,3)}-XXX-${digits.slice(6)}`;
  return phone;
}

// 이름+번호를 등록 순간(마스킹 전)에 해시로만 남겨서, 원본 저장 없이 중복 등록을 판별
async function dedupFingerprint(name, phone) {
  const normName = (name || "").trim().replace(/\s+/g, "");
  const normPhone = (phone || "").replace(/[^0-9]/g, "");
  if (!normName || !normPhone) return null;
  const salt = "wanggaebeobsang-dedup-v1"; // 고정 salt: 무지개표 대조를 조금이라도 어렵게 함
  const data = new TextEncoder().encode(`${salt}:${normName}:${normPhone}`);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// 지역/부서는 이제 DB(regions/depts 테이블)에서 관리됨. 이 맵들은 App에서 fetch 후 채워짐.
let REGION_LABEL_MAP = {};
let DEPT_LABEL_MAP = {};
const deptLabel = (k) => DEPT_LABEL_MAP[k] || k;
const regionLabel = (k) => REGION_LABEL_MAP[k] || k;
function colorForKey(key) {
  const palette = [C.amber, C.copper, C.steel, C.goldBright, C.danger];
  let hash = 0;
  for (let i=0;i<String(key).length;i++) hash = (hash*31 + String(key).charCodeAt(i)) >>> 0;
  return palette[hash % palette.length];
}

const inputStyle = { width: "100%", border: `1px solid ${C.amberLine}55`, borderRadius: 10, padding: "10px 12px", fontSize: 14, outline: "none", fontFamily: FONT_BODY, background: C.hanji, color: "#3A2A16" };

function Field({ label, children }) {
  return <div><div style={{ color: C.sub }} className="text-xs font-semibold mb-1">{label}</div>{children}</div>;
}
function RegionTag({ region }) {
  const c = colorForKey(region);
  return <span style={{ background: c+"1A", color: c }} className="text-[11px] font-bold px-2.5 py-0.5 rounded-full">{regionLabel(region)}</span>;
}
function EmptyState({ text }) {
  return <div style={{ border: `1px dashed ${C.border}`, color: C.sub }} className="rounded-xl py-8 text-center text-sm">{text}</div>;
}


/* ===== 최상위 앱: 로그인 상태 관리 ===== */
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [labelRows, setLabelRows] = useState(null);
  const [siteTexts, setSiteTexts] = useState(null);
  const [regionRows, setRegionRows] = useState(null);
  const [deptRows, setDeptRows] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recoveryMode, setRecoveryMode] = useState(false);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supabase.auth.onAuthStateChange((event, sess) => {
      if (event === "PASSWORD_RECOVERY") setRecoveryMode(true);
      setSession(sess);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadLabels = async () => {
    const { data } = await supabase.from("labels").select("*").order("sort_order", { ascending: true });
    setLabelRows(data || []);
  };
  const loadSiteTexts = async () => {
    const { data } = await supabase.from("site_texts").select("*");
    const map = {};
    (data||[]).forEach(t => map[t.text_key] = t.content);
    setSiteTexts(map);
  };
  const loadRegions = async () => {
    const { data } = await supabase.from("regions").select("*").order("sort_order", { ascending: true });
    const rows = data || [];
    const map = {}; rows.forEach(r => map[r.region_key] = r.display_name);
    REGION_LABEL_MAP = map;
    setRegionRows(rows);
  };
  const loadDepts = async () => {
    const { data } = await supabase.from("depts").select("*").order("sort_order", { ascending: true });
    const rows = data || [];
    const map = {}; rows.forEach(d => map[d.dept_key] = d.display_name);
    DEPT_LABEL_MAP = map;
    setDeptRows(rows);
  };

  useEffect(() => { loadSiteTexts(); loadRegions(); loadDepts(); }, []);

  useEffect(() => {
    if (!session) { setProfile(null); setLoading(false); return; }
    (async () => {
      setLoading(true);
      const { data: p } = await supabase.from("profiles").select("*").eq("id", session.user.id).single();
      setProfile(p);
      await loadLabels();
      setLoading(false);
    })();
  }, [session]);

  if (recoveryMode) return <ResetPasswordScreen onDone={() => setRecoveryMode(false)} />;
  if (loading && session) return <div style={{background:C.bg,minHeight:"100vh"}} />;
  if (!session || !profile) return <AuthScreen siteTexts={siteTexts||{}} regionRows={regionRows||[]} deptRows={deptRows||[]} />;
  return <Dashboard profile={profile} labelRows={labelRows||[]} onLabelsChanged={loadLabels} siteTexts={siteTexts||{}} onTextsChanged={loadSiteTexts}
    regionRows={regionRows||[]} deptRows={deptRows||[]} onRegionsChanged={loadRegions} onDeptsChanged={loadDepts} />;
}

function ResetPasswordScreen({ onDone }) {
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [busy, setBusy] = useState(false);

  const save = async () => {
    if (password.length < 6) { setError("비밀번호는 6자 이상이어야 해요."); return; }
    setBusy(true); setError("");
    const { error } = await supabase.auth.updateUser({ password });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("비밀번호가 변경됐어요. 이제 이 비밀번호로 로그인하시면 돼요.");
  };

  return (
    <div style={{background:`linear-gradient(180deg, ${C.bg} 0%, ${C.ink} 100%)`,minHeight:"100vh",fontFamily:FONT_BODY}} className="flex items-center justify-center px-5">
      <div style={{background:C.card, border:`1px solid ${C.amberLine}55`}} className="w-full max-w-sm rounded-2xl p-6">
        <div className="text-lg font-extrabold mb-1" style={{color:C.text,fontFamily:FONT_DISPLAY}}>새 비밀번호 설정</div>
        <p style={{color:C.sub}} className="text-xs mb-5">새로 쓸 비밀번호를 입력해주세요.</p>
        <div className="flex flex-col gap-3">
          <Field label="새 비밀번호"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle} /></Field>
          {error && <div style={{color:C.danger}} className="text-xs font-semibold">{error}</div>}
          {notice ? (
            <>
              <div style={{color:C.goldBright}} className="text-xs font-semibold">{notice}</div>
              <button onClick={onDone} style={{background:`linear-gradient(135deg, ${C.wineBright}, ${C.wine})`,color:C.goldBright,border:`1px solid ${C.amberLine}`}} className="font-bold py-3 rounded-xl mt-1">로그인 화면으로</button>
            </>
          ) : (
            <button onClick={save} disabled={busy} style={{background:C.amber,color:C.ink}} className="font-bold py-3 rounded-xl mt-1">{busy?"저장 중...":"비밀번호 저장"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ===== 로그인 / 회원가입 ===== */
function AuthScreen({ siteTexts, regionRows, deptRows }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [roleOptions, setRoleOptions] = useState([]);
  const [role, setRole] = useState("");
  const [region, setRegion] = useState("");
  const [dept, setDept] = useState("");
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    (async () => {
      const { data } = await supabase.from("labels").select("*").order("sort_order", { ascending: true });
      setRoleOptions(data || []);
      if (data && data.length) setRole(data[0].role_key);
    })();
  }, []);
  useEffect(() => {
    if (regionRows && regionRows.length && !region) setRegion(regionRows[0].region_key);
  }, [regionRows]);
  useEffect(() => {
    if (deptRows && deptRows.length && !dept) setDept(deptRows[0].dept_key);
  }, [deptRows]);

  const signIn = async () => {
    setError(""); setBusy(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) setError(error.message);
  };
  const signUp = async () => {
    setError(""); setNotice(""); setBusy(true);
    const { error } = await supabase.auth.signUp({ email, password, options: { data: { name: maskName(name), role, region, dept } } });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("가입 완료! 이메일 인증이 필요할 수 있어요. 인증 후 로그인해주세요.");
    setMode("signin");
  };
  const sendResetEmail = async () => {
    if (!email) { setError("비밀번호를 재설정할 이메일을 위에 먼저 입력해주세요."); return; }
    setError(""); setNotice(""); setBusy(true);
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
    setBusy(false);
    if (error) { setError(error.message); return; }
    setNotice("비밀번호 재설정 링크를 이메일로 보냈어요. 메일함을 확인해주세요.");
  };

  return (
    <div style={{
        backgroundImage: `url(${siteTexts.bg_image_url || "bg-palace.png"})`,
        backgroundSize: "cover", backgroundPosition: "center", backgroundRepeat: "no-repeat",
        minHeight: "100vh",
      }} className="relative">
      <div style={{background:`radial-gradient(circle at 20% 80%, ${C.wine}44 0%, transparent 55%), linear-gradient(180deg, ${C.bg}55 0%, ${C.ink}77 55%, #05030799 100%)`}} className="absolute inset-0" />
      <div style={{fontFamily:FONT_BODY}} className="relative z-10 flex items-center justify-center px-5 py-10 min-h-screen">
      <div className="w-full max-w-sm">
        <PosterPanel title={siteTexts.hero_title || "누가 왕이 될 상인가"} subtitle={siteTexts.hero_subtitle || "왕의 자리는 당신의 것"} compact imgSrc={siteTexts.poster_login_url || "poster-login.png"} />
        <div style={{background:`linear-gradient(180deg, ${C.card}, #0A0705)`, border:`1px solid ${C.amberLine}55`, borderTop:"none", boxShadow:`0 20px 50px #00000088`}} className="w-full rounded-b-3xl p-7 -mt-2">
          <div style={{background:"#000000", border:`1px solid ${C.amberLine}33`}} className="flex gap-1 mb-5 p-1 rounded-full">
            <button onClick={()=>setMode("signin")} style={{background:mode==="signin"?`linear-gradient(135deg, ${C.wineBright}, ${C.wine})`:"transparent",color:mode==="signin"?C.goldBright:C.sub,border:mode==="signin"?`1px solid ${C.amberLine}88`:"1px solid transparent"}} className="flex-1 py-2 rounded-full text-sm font-bold">로그인</button>
            <button onClick={()=>setMode("signup")} style={{background:mode==="signup"?`linear-gradient(135deg, ${C.wineBright}, ${C.wine})`:"transparent",color:mode==="signup"?C.goldBright:C.sub,border:mode==="signup"?`1px solid ${C.amberLine}88`:"1px solid transparent"}} className="flex-1 py-2 rounded-full text-sm font-bold">회원가입</button>
          </div>
          <div className="flex flex-col gap-3">
            <Field label="이메일"><input value={email} onChange={e=>setEmail(e.target.value)} style={inputStyle} placeholder="you@example.com" /></Field>
            <Field label="비밀번호"><input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={inputStyle} /></Field>
            {mode==="signup" && <>
              <Field label="이름"><input value={name} onChange={e=>setName(e.target.value)} style={inputStyle} /></Field>
              <Field label="역할"><select value={role} onChange={e=>setRole(e.target.value)} style={inputStyle}>{roleOptions.map(r=><option key={r.role_key} value={r.role_key}>{r.display_name}</option>)}</select></Field>
              <Field label="지역"><select value={region} onChange={e=>setRegion(e.target.value)} style={inputStyle}>{regionRows.map(r=><option key={r.region_key} value={r.region_key}>{r.display_name}</option>)}</select></Field>
              <Field label="부서"><select value={dept} onChange={e=>setDept(e.target.value)} style={inputStyle}>{deptRows.map(d=><option key={d.dept_key} value={d.dept_key}>{d.display_name}</option>)}</select></Field>
            </>}
            {error && <div style={{color:C.danger}} className="text-xs font-semibold">{error}</div>}
            {notice && <div style={{color:C.goldBright}} className="text-xs font-semibold">{notice}</div>}
            <button onClick={mode==="signin"?signIn:signUp} disabled={busy}
              style={{background:`linear-gradient(135deg, ${C.wineBright}, ${C.wine})`, color:C.goldBright, border:`1px solid ${C.amberLine}`, boxShadow:`0 0 0px ${C.amber}00`}}
              className="royal-btn font-bold py-3 rounded-full mt-1 transition-shadow">
              {busy ? "처리 중..." : mode==="signin" ? "로그인" : "가입하기"}
            </button>
            {mode==="signin" && (
              <button onClick={sendResetEmail} disabled={busy} style={{color:C.sub}} className="text-xs text-center underline mt-1">
                비밀번호를 잊으셨나요?
              </button>
            )}
          </div>
          <div style={{color:C.sub,background:"#00000066",border:`1px solid ${C.amberLine}33`}} className="text-[11px] rounded-lg px-3 py-2 mt-4 flex items-center gap-1.5">
            <span>🛡️</span><span>총관리자 계정은 일반 가입 후 총관리자가 직접 권한을 바꿔줘야 해요.</span>
          </div>
        </div>
      </div>
      <style>{`.royal-btn:hover{box-shadow:0 0 18px ${C.amber}99, 0 0 4px ${C.goldBright}66 !important;}`}</style>
      </div>
    </div>
  );
}

/* ===== 대시보드 ===== */
function Dashboard({ profile, labelRows, onLabelsChanged, siteTexts, onTextsChanged, regionRows, deptRows, onRegionsChanged, onDeptsChanged }) {
  const ROLE_KEYS = useMemo(() => labelRows.map(l => l.role_key), [labelRows]);
  const ROLES = useMemo(() => {
    const out = {};
    labelRows.forEach(l => out[l.role_key] = { label: l.display_name, metricLabel: l.metric_label, metricType: l.metric_type });
    return out;
  }, [labelRows]);

  const [activeRole, setActiveRole] = useState(null);
  const [entries, setEntries] = useState([]);
  const [detailOwner, setDetailOwner] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [showBulk, setShowBulk] = useState(false);
  const [showCategoryManager, setShowCategoryManager] = useState(false);
  const [showTextManager, setShowTextManager] = useState(false);

  const [showRegionDeptManager, setShowRegionDeptManager] = useState(false);
  const [showPhotoUpload, setShowPhotoUpload] = useState(false);
  const [view, setView] = useState("top3");
  const [fetchError, setFetchError] = useState("");
  const [ownerProfiles, setOwnerProfiles] = useState({});
  const [refreshKey, setRefreshKey] = useState(0);

  const isAdmin = profile.role === "관리자";

  // 카테고리 목록이 바뀌면(첫 로드, 총관리자 추가/삭제 포함) 선택된 탭을 안전하게 보정
  useEffect(() => {
    if (ROLE_KEYS.length === 0) { setActiveRole(null); return; }
    if (!activeRole || !ROLE_KEYS.includes(activeRole)) setActiveRole(ROLE_KEYS[0]);
  }, [ROLE_KEYS]);


  useEffect(() => {
    if (!activeRole) return;
    (async () => {
      setFetchError("");
      const { data, error } = await supabase.from("entries").select("*").eq("role", activeRole).order("created_at", { ascending: true });
      if (error) { setFetchError(error.message); setEntries([]); return; }
      setEntries(data || []);
    })();
  }, [activeRole, showForm, refreshKey]);

  useEffect(() => {
    (async () => {
      const ids = [...new Set(entries.map(e => e.owner_id).filter(Boolean))];
      if (ids.length === 0) { setOwnerProfiles({}); return; }
      const { data } = await supabase.from("profiles").select("id, name, region, dept, photo_url").in("id", ids);
      const map = {};
      (data||[]).forEach(p => map[p.id] = p);
      setOwnerProfiles(map);
    })();
  }, [entries, refreshKey]);

  const ranking = useMemo(() => {
    const grouped = {};
    entries.forEach(e => {
      const key = e.owner_id || ("name:" + e.owner_name);
      const p = e.owner_id ? ownerProfiles[e.owner_id] : null;
      if (!grouped[key]) grouped[key] = {
        key, owner_id: e.owner_id, owner_name: e.owner_name,
        region: p?.region || e.region, dept: p?.dept || e.dept, total: 0,
        photoUrl: p?.photo_url || null,
      };
      if (!e.is_duplicate) grouped[key].total += e.metric; // 중복 건은 점수에서 제외
    });
    return Object.values(grouped).sort((a,b)=>b.total-a.total);
  }, [entries, ownerProfiles]);
  const displayName = (row) => (row.owner_id ? (ownerProfiles[row.owner_id]?.name) : row.owner_name) || "";

  const top3 = ranking.slice(0,3);

        ) : (
          <div className="flex flex-wrap items-center justify-center gap-2.5 mb-3">

                      </div>
                    </div>

                );
              })}
            </div>
            {rest.length>0 && <>
              <h3 style={{color:C.text,fontFamily:FONT_DISPLAY}} className="text-xs font-bold mb-3 tracking-wide">4 – {ranking.length}위</h3>
              <RankList rows={rest} startRank={4} displayName={displayName} onSelect={setDetailOwner} maxValue={top3[0].total || 1} />
            </>}
          </>}
          {view==="all" && ranking.length>0 && <RankList rows={ranking} startRank={1} displayName={displayName} onSelect={setDetailOwner} highlightTop3 maxValue={ranking[0].total || 1} />}
        </>}
      </div>

      {detailOwner && (
        <DetailModal
          owner={displayName(detailRow || {})}
          ownerId={detailRow?.owner_id}
          roleKey={activeRole}
          region={detailRow?.region}
          dept={detailRow?.dept}
          roleLabel={ROLES[activeRole]?.label}
          roles={ROLES}
          regionRows={regionRows}
          deptRows={deptRows}
          entries={detailEntries}
          allowed={canSeeDetail}
          isAdmin={isAdmin}
          onClose={()=>setDetailOwner(null)}
          onChanged={()=>setRefreshKey(k=>k+1)}
        />
      )}
      {showForm && <EntryForm profile={profile} roles={ROLES} regionRows={regionRows} deptRows={deptRows} onClose={()=>setShowForm(false)} onSubmitted={()=>setShowForm(false)} />}
      {showBulk && <BulkEntryForm roles={ROLES} onClose={()=>setShowBulk(false)} onSaved={()=>setRefreshKey(k=>k+1)} />}
      {showCategoryManager && <CategoryManager labelRows={labelRows} onClose={()=>setShowCategoryManager(false)} onChanged={onLabelsChanged} />}
      {showTextManager && <SiteTextManager siteTexts={siteTexts} onClose={()=>setShowTextManager(false)} onChanged={onTextsChanged} />}

      {showRegionDeptManager && <RegionDeptManager regionRows={regionRows} deptRows={deptRows} onClose={()=>setShowRegionDeptManager(false)} onRegionsChanged={onRegionsChanged} onDeptsChanged={onDeptsChanged} />}
      {showPhotoUpload && <PhotoUploadModal profile={profile} onClose={()=>setShowPhotoUpload(false)} onChanged={()=>setRefreshKey(k=>k+1)} />}
    </div>
  );
}

function MarqueeBar({ text }) {
  const t = text || "👑 이달의 실적왕은 누구? · 지금 바로 확인하기 · 순위는 실시간으로 반영돼요 · ";
  const block = t.repeat(10); // 초광폭 화면에서도 한 블록 자체가 화면보다 길도록 충분히 반복
  return (
    <div style={{background:`linear-gradient(90deg, ${C.wine}, ${C.ink})`, borderBottom:`1px solid ${C.amberLine}44`}} className="overflow-hidden whitespace-nowrap py-2.5">
      <div className="inline-flex" style={{animation:"marquee 140s linear infinite"}}>
        <span style={{color:C.amberLine,fontFamily:FONT_DISPLAY}} className="text-[18px] flex-shrink-0">{block}</span>
        <span style={{color:C.amberLine,fontFamily:FONT_DISPLAY}} className="text-[18px] flex-shrink-0">{block}</span>
      </div>
      <style>{`@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }`}</style>
    </div>
  );
}

function PosterPanel({ title, subtitle, compact, imgSrc }) {
  if (imgSrc) {
    return (
      <div style={{background:`linear-gradient(135deg, ${C.goldBright}, ${C.amber} 40%, ${C.wine} 100%)`, boxShadow:`0 0 40px ${C.amber}33, 0 20px 40px #00000066`}}
        className={`p-[3px] ${compact ? "rounded-t-3xl" : "rounded-3xl"}`}>
        <div style={{background:C.ink}} className={`p-1.5 ${compact ? "rounded-t-[22px]" : "rounded-[22px]"}`}>
          <div style={{border:`1px solid ${C.amberLine}88`}} className="relative overflow-hidden rounded-2xl">
            <img src={imgSrc} alt={title} className="w-full h-auto block" onError={(e)=>{e.target.style.display="none"; e.target.nextSibling.style.display="block";}} />
            <div style={{display:"none"}}>
              <PosterPanelText title={title} subtitle={subtitle} compact={compact} />
            </div>
          </div>
        </div>
      </div>
    );
  }
  return <PosterPanelText title={title} subtitle={subtitle} compact={compact} />;
}
function PosterPanelText({ title, subtitle, compact }) {
  return (
    <div style={{background:`linear-gradient(160deg, ${C.card}, ${C.ink})`, border:`1px solid ${C.amberLine}66`, boxShadow:`0 0 30px ${C.amber}22`}}
      className={`relative overflow-hidden px-6 text-center ${compact ? "pt-7 pb-8 rounded-t-3xl" : "pt-10 pb-9 rounded-3xl"}`}>
      <CornerOrnament className="absolute top-3 left-3" />
      <CornerOrnament className="absolute top-3 right-3" flip="x" />
      <CornerOrnament className="absolute bottom-3 left-3" flip="y" />
      <CornerOrnament className="absolute bottom-3 right-3" flip="xy" />
      <div style={{fontSize:compact?26:32}} className="mb-1">👑</div>
      <h1 style={{color:C.goldBright,fontFamily:FONT_DISPLAY}} className={compact?"text-2xl leading-snug":"text-3xl leading-snug"}>
        <span style={{color:C.amber}}>〈</span> {title} <span style={{color:C.amber}}>〉</span>
      </h1>
      {subtitle && <p style={{color:C.sub}} className="text-[12px] mt-2">◈ {subtitle}</p>}

}
function CornerOrnament({ className, flip }) {
  const t = flip==="x" ? "scaleX(-1)" : flip==="y" ? "scaleY(-1)" : flip==="xy" ? "scale(-1,-1)" : "none";
  return <svg width="20" height="20" viewBox="0 0 20 20" className={className} style={{transform:t}}><path d="M2 2 H13 M2 2 V13" stroke="#C9A227" strokeWidth="2" fill="none" /></svg>;
}

function LogoMark() {
  return (
    <div style={{background:C.amber,width:30,height:30,borderRadius:8}} className="flex items-center justify-center flex-shrink-0">
      <span style={{fontSize:16,lineHeight:1}}>👑</span>
    </div>
  );
}

function ScoreRow({ rank, row, name, metricLabel, maxValue, big, onClick }) {
  const tone = rank===1
    ? { bar:C.amber, chip:C.amber, chipRing:C.goldBright, chipText:C.ink, edge:C.amberLine, glow:`${C.amber}44`, bgTint:C.amber, medal:"👑" }
    : rank===2
    ? { bar:C.steel, chip:C.steel, chipRing:"#C7CEE6", chipText:C.ink, edge:C.steel, glow:`${C.steel}33`, bgTint:C.steel, medal:"🥈" }
    : { bar:C.copper, chip:C.copper, chipRing:"#E2A574", chipText:C.ink, edge:C.copper, glow:`${C.copper}33`, bgTint:C.copper, medal:"🥉" };
  const pct = Math.max(6, Math.round((row.total / (maxValue||1)) * 100));
  return (
    <button onClick={onClick}
      style={{
        background: `linear-gradient(160deg, ${C.card}, ${tone.bgTint}22 60%, ${C.card})`,
        border: `1px solid ${tone.edge}`,
        boxShadow: `0 0 28px ${tone.glow}, inset 0 0 40px ${tone.bgTint}11`,
        height: "100%",
      }}
      className={`relative w-full h-full text-left rounded-2xl overflow-visible flex flex-col justify-center ${big?"px-5 pt-6 pb-5":"px-4 pt-5 pb-4"}`}>
      {/* 금장 코너 장식 */}
      <CornerOrnament className="absolute top-2 left-2" />
      <CornerOrnament className="absolute top-2 right-2" flip="x" />
      <CornerOrnament className="absolute bottom-2 left-2" flip="y" />
      <CornerOrnament className="absolute bottom-2 right-2" flip="xy" />

      {/* 상단 중앙 메달 배지 + 술 장식 */}
      <div className="absolute -top-4 left-1/2 -translate-x-1/2 flex flex-col items-center">
        <div style={{
            background: `radial-gradient(circle at 35% 30%, ${tone.chipRing}, ${tone.chip} 70%)`,
            border: `2px solid ${tone.chipRing}`,
            boxShadow: `0 3px 10px #00000066, 0 0 12px ${tone.glow}`,
          }} className={`rounded-full flex items-center justify-center flex-shrink-0 ${big?"w-12 h-12 text-xl":"w-9 h-9 text-base"}`}>
          <span style={{fontFamily:FONT_DISPLAY,color:tone.chipText}}>{rank}</span>
        </div>
        <div className="flex gap-0.5 -mt-0.5">
          <div style={{background:tone.bar,clipPath:"polygon(0 0,100% 0,50% 100%)"}} className="w-1.5 h-2.5" />
          <div style={{background:tone.chipRing,clipPath:"polygon(0 0,100% 0,50% 100%)"}} className="w-1.5 h-3.5" />
          <div style={{background:tone.bar,clipPath:"polygon(0 0,100% 0,50% 100%)"}} className="w-1.5 h-2.5" />
        </div>
      </div>

      <div className="flex items-center justify-between mb-2 mt-2">
        <div className="flex items-center gap-2.5">
          <span style={{fontSize: big?26:20}}>{tone.medal}</span>
          <div>
            <div className="flex items-center gap-1.5 mb-0.5"><RegionTag region={row.region} /><span style={{color:C.sub}} className="text-[11px] font-semibold">{deptLabel(row.dept)}</span></div>
            <div style={{color:C.text,fontFamily:FONT_DISPLAY}} className={big?"text-xl":"text-[15px] font-extrabold"}>{name}</div>
          </div>
        </div>
      </div>
      <div style={{fontFamily:FONT_DISPLAY,color:tone.edge}} className={`font-bold mb-2 ${big?"text-3xl":"text-lg"}`}>{row.total}<span style={{color:C.sub,fontFamily:FONT_BODY}} className="text-[10px] font-semibold ml-1">{metricLabel}</span></div>
      <div style={{background:"#00000066", height: big?8:6}} className="w-full rounded-full overflow-hidden">
        <div style={{background:`linear-gradient(90deg, ${tone.bar}, ${C.goldBright})`, width:`${pct}%`, height:"100%"}} className="rounded-full" />
      </div>
    </button>
  );
}

function RankList({ rows, startRank, displayName, onSelect, highlightTop3, maxValue }) {
  return (
    <div className="flex flex-col gap-2">
      {rows.map((row,i)=>{
        const rank = startRank+i;
        const isTop = highlightTop3 && rank<=3;
        const tone = rank===1 ? C.amber : rank===2 ? C.steel : rank===3 ? C.copper : C.teal;
        const pct = Math.max(4, Math.round((row.total / (maxValue||1)) * 100));
        return (
          <button key={row.key} onClick={()=>onSelect(row.key)} style={{background:C.card,border:`1px solid ${C.border}`}} className="w-full text-left rounded-xl px-4 py-2.5">
            <div className="flex items-center justify-between mb-1.5">
              <div className="flex items-center gap-2.5">
                <span style={{color:isTop?(rank===1?C.ink:"#fff"):C.sub,background:isTop?tone:C.ink,border:`1px solid ${isTop?tone:C.border}`,fontFamily:FONT_DISPLAY}} className="text-[11px] font-bold w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0">{rank}</span>
                <RegionTag region={row.region} />
                <span className="text-[13px] font-bold" style={{color:C.text}}>{maskName(displayName(row))}</span>
                <span style={{color:C.sub}} className="text-[11px]">{deptLabel(row.dept)}</span>
              </div>
              <span style={{color:C.text,fontFamily:FONT_DISPLAY}} className="text-[13px] font-bold">{row.total}</span>
            </div>
            <div style={{background:C.bg,height:4}} className="w-full rounded-full overflow-hidden">
              <div style={{background:tone, width:`${pct}%`, height:"100%"}} className="rounded-full" />
            </div>
          </button>
        );
      })}
    </div>
  );
}

function DetailModal({ owner, ownerId, roleKey, region, dept, roleLabel, roles, regionRows, deptRows, entries, allowed, isAdmin, onClose, onChanged }) {
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editPhone, setEditPhone] = useState("");
  const [busyId, setBusyId] = useState(null);
  const [ghostBusy, setGhostBusy] = useState(false);

  const [editingProfile, setEditingProfile] = useState(false);
  const [pName, setPName] = useState(owner);
  const [pRegion, setPRegion] = useState(region);
  const [pDept, setPDept] = useState(dept);
  const [pBusy, setPBusy] = useState(false);
  const [pMsg, setPMsg] = useState("");
  const [photoBusy, setPhotoBusy] = useState(false);

  const startEdit = (e) => {
    setEditingId(e.id);
    setEditName(e.target_name);
    setEditPhone(e.phone_masked);
  };

  const saveEdit = async (id) => {
    setBusyId(id);
    const { error } = await supabase.from("entries").update({ target_name: editName, phone_masked: editPhone }).eq("id", id);
    setBusyId(null);
    if (!error) { setEditingId(null); onChanged(); }
  };

  const deleteEntry = async (id) => {
    if (!window.confirm("이 기록을 삭제할까요? 되돌릴 수 없어요.")) return;
    setBusyId(id);
    const { error } = await supabase.from("entries").delete().eq("id", id);
    setBusyId(null);
    if (!error) onChanged();
  };

  const saveProfile = async () => {
    setPBusy(true); setPMsg("");
    const { error } = await supabase.from("profiles").update({ name: maskName(pName), region: pRegion, dept: pDept }).eq("id", ownerId);
    setPBusy(false);
    if (error) { setPMsg("저장 실패: " + error.message); return; }
    setPMsg("✅ 저장했어요.");
    setEditingProfile(false);
    onChanged();
  };

  const deleteProfile = async () => {
    if (!window.confirm(`${owner} 님의 프로필을 삭제할까요? 이 사람이 등록한 실적 기록도 함께 삭제돼요 (되돌릴 수 없어요). 로그인 계정 자체는 Supabase 대시보드에서 별도로 지워야 해요.`)) return;
    setPBusy(true); setPMsg("");
    const { error } = await supabase.from("profiles").delete().eq("id", ownerId);
    setPBusy(false);
    if (error) { setPMsg("삭제 실패: " + error.message); return; }
    onChanged();
    onClose();
  };

  const uploadPhotoForEmployee = async (file) => {
    if (!file) return;
    setPhotoBusy(true); setPMsg("");
    const ext = file.name.split(".").pop();
    await supabase.storage.from("profile-photos").remove(
      ["jpg","jpeg","png","webp","gif"].filter(e=>e!==ext).map(e => `${ownerId}/photo.${e}`)
    );
    const path = `${ownerId}/photo.${ext}`;
    const { error: upErr } = await supabase.storage.from("profile-photos").upload(path, file, { upsert: true });
    if (upErr) { setPhotoBusy(false); setPMsg("업로드 실패: " + upErr.message); return; }
    const { data: pub } = supabase.storage.from("profile-photos").getPublicUrl(path);
    const cacheBusted = `${pub.publicUrl}?t=${Date.now()}`;
    const { error: dbErr } = await supabase.from("profiles").update({ photo_url: cacheBusted }).eq("id", ownerId);
    setPhotoBusy(false);
    if (dbErr) { setPMsg("저장 실패: " + dbErr.message); return; }
    setPMsg("✅ 사진 등록 완료!");
    onChanged();
  };

  const removePhotoForEmployee = async () => {
    if (!window.confirm("이 직원의 사진을 지울까요?")) return;
    setPhotoBusy(true); setPMsg("");
    await supabase.storage.from("profile-photos").remove(
      ["jpg","jpeg","png","webp","gif"].map(ext => `${ownerId}/photo.${ext}`)
    );
    const { error } = await supabase.from("profiles").update({ photo_url: null }).eq("id", ownerId);
    setPhotoBusy(false);
    if (error) { setPMsg("삭제 실패: " + error.message); return; }
    setPMsg("사진을 지웠어요.");
    onChanged();
  };

  // 프로필(로그인 계정)이 없는 사람 - 일괄등록으로만 만들어진 "가짜 계정" 전체 삭제
  const deleteGhostPerson = async () => {
    if (!window.confirm(`"${owner}" 이름으로 등록된 기록을 전부 삭제할까요? 되돌릴 수 없어요.`)) return;
    setGhostBusy(true);
    const { error } = await supabase.from("entries").delete()
      .eq("role", roleKey).eq("owner_name", owner).is("owner_id", null);
    setGhostBusy(false);
    if (!error) { onChanged(); onClose(); }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-md rounded-t-2xl md:rounded-2xl max-h-[85vh] flex flex-col overflow-hidden">
        <div style={{background:C.card,borderBottom:`1px solid ${C.border}`}} className="flex items-start justify-between px-5 py-4 flex-shrink-0">
          <div>
            <div className="flex items-center gap-2 mb-1"><RegionTag region={region} /><span style={{color:C.sub}} className="text-xs font-semibold">{deptLabel(dept)}</span></div>
            <div className="flex items-center gap-2">
              <div className="text-lg font-extrabold" style={{color:C.text}}>{maskName(owner)} <span style={{color:C.sub}} className="text-xs font-medium">· {roleLabel}</span></div>
              {allowed && isAdmin && !ownerId && (
                <button onClick={deleteGhostPerson} disabled={ghostBusy} style={{color:C.danger}} className="text-[11px] font-bold">삭제</button>
              )}
            </div>
          </div>
          <button onClick={onClose} style={{background:C.bg}} className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0">✕</button>
        </div>
        <div className="overflow-y-auto px-5 py-4">
          {allowed && isAdmin && ownerId && (
            <div style={{border:`1px solid ${C.border}`}} className="rounded-xl p-3 mb-4">
              {!editingProfile ? (
                <button onClick={()=>{setEditingProfile(true); setPName(owner); setPRegion(region); setPDept(dept);}} style={{color:C.slate}} className="text-xs font-bold w-full text-left">✏️ 직원 정보(이름·지역·부서) 수정</button>
              ) : (
                <div className="flex flex-col gap-2">
                  <Field label="이름 (저장 시 자동 마스킹돼요)"><input value={pName} onChange={e=>setPName(e.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}} /></Field>
                  <div className="grid grid-cols-2 gap-2">
                    <Field label="지역">
                      <select value={pRegion||""} onChange={e=>setPRegion(e.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}}>
                        {(regionRows||[]).map(r=><option key={r.region_key} value={r.region_key}>{r.display_name}</option>)}
                      </select>
                    </Field>
                    <Field label="부서">
                      <select value={pDept||""} onChange={e=>setPDept(e.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}}>
                        {(deptRows||[]).map(d=><option key={d.dept_key} value={d.dept_key}>{d.display_name}</option>)}
                      </select>
                    </Field>
                  </div>
                  {pMsg && <div style={{color: pMsg.includes("실패")?C.danger:C.teal}} className="text-xs font-semibold">{pMsg}</div>}
                  <div className="flex gap-2">
                    <button onClick={saveProfile} disabled={pBusy} style={{background:C.amber,color:C.ink}} className="flex-1 text-xs font-bold py-1.5 rounded-lg">저장</button>
                    <button onClick={()=>setEditingProfile(false)} style={{background:C.bg,color:C.sub}} className="flex-1 text-xs font-bold py-1.5 rounded-lg">취소</button>
                    <button onClick={deleteProfile} disabled={pBusy} style={{color:C.danger}} className="text-xs font-bold px-2">프로필 삭제</button>
                  </div>
                  <div style={{borderTop:`1px solid ${C.border}`}} className="pt-2 mt-1">
                    <div style={{color:C.sub}} className="text-[11px] font-semibold mb-1">순위 카드용 사진 (1~3등일 때 표시)</div>
                    <input type="file" accept="image/*" onChange={e=>uploadPhotoForEmployee(e.target.files[0])} disabled={photoBusy} />
                    <button onClick={removePhotoForEmployee} disabled={photoBusy} style={{color:C.danger}} className="text-[11px] font-bold ml-2">사진 삭제</button>
                  </div>
                </div>
              )}
            </div>
          )}
          {!allowed ? (
            <div style={{border:`1px solid ${C.border}`}} className="rounded-xl py-8 text-center px-4">
              <div className="mb-2">🔒</div>
              <div style={{color:C.sub}} className="text-sm">다른 사람의 상세 기록은 총관리자만 볼 수 있어요.</div>
            </div>
          ) : (
            <div className="flex flex-col gap-2">
              <div style={{color:C.sub}} className="text-xs font-semibold mb-1">총 {entries.length}건</div>
              {entries.map(e=>(
                <div key={e.id} style={{border:`1px solid ${C.border}`}} className="rounded-lg px-3 py-2.5">
                  {editingId === e.id ? (
                    <div className="flex flex-col gap-2">
                      <input value={editName} onChange={ev=>setEditName(ev.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}} placeholder="이름(마스킹된 값)" />
                      <input value={editPhone} onChange={ev=>setEditPhone(ev.target.value)} style={{...inputStyle,padding:"6px 8px",fontSize:13}} placeholder="010-XXXX-0000" />
                      <div className="flex gap-2">
                        <button onClick={()=>saveEdit(e.id)} disabled={busyId===e.id} style={{background:C.emerald,color:C.ink}} className="flex-1 text-xs font-bold py-1.5 rounded-lg">저장</button>
                        <button onClick={()=>setEditingId(null)} style={{background:C.bg,color:C.sub}} className="flex-1 text-xs font-bold py-1.5 rounded-lg">취소</button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="text-sm font-semibold flex items-center gap-1.5" style={{color:C.text}}>
                          {e.target_name || "(대상자 정보 없음, 일괄등록)"}
                          {e.is_duplicate && <span style={{background:`${C.danger}22`,color:C.danger,border:`1px solid ${C.danger}55`}} className="text-[10px] font-bold px-1.5 py-0.5 rounded-full">⚠ 중복</span>}
                        </div>
                        <div style={{color:C.sub}} className="text-xs font-mono">{e.phone_masked}</div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="text-right">
                          <div style={{color:C.emerald}} className="text-sm font-bold">{e.metric}</div>
                          <div style={{color:C.sub}} className="text-[11px]">{new Date(e.created_at).toISOString().slice(0,10)}</div>
                        </div>
                        {isAdmin && (
                          <div className="flex flex-col gap-1 ml-1">
                            <button onClick={()=>startEdit(e)} style={{color:C.slate}} className="text-[11px] font-semibold">수정</button>
                            <button onClick={()=>deleteEntry(e.id)} disabled={busyId===e.id} style={{color:C.danger}} className="text-[11px] font-semibold">삭제</button>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{borderTop:`1px solid ${C.border}`}} className="px-5 py-3 flex-shrink-0">
          <button onClick={onClose} style={{background:C.navy}} className="w-full text-white font-bold py-2.5 rounded-xl text-sm">뒤로가기</button>
        </div>
      </div>
    </div>
  );
}

function BulkEntryForm({ roles, onClose, onSaved }) {
  const [role, setRole] = useState("ROLE_1");
  const [rawText, setRawText] = useState("");
  const [rows, setRows] = useState(null);
  const [headers, setHeaders] = useState([]);
  const [mapRegion, setMapRegion] = useState("");
  const [mapDept, setMapDept] = useState("");
  const [mapName, setMapName] = useState("");
  const [mapTarget, setMapTarget] = useState("");
  const [mapPhone, setMapPhone] = useState("");
  const [mapValue, setMapValue] = useState(""); // 선택: 없으면 전부 1건씩
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const splitLine = (line, delim) => delim === "ws" ? line.trim().split(/\s+/) : line.split(delim);

  const parseText = () => {
    const lines = rawText.trim().split("\n").filter(l => l.trim());
    if (lines.length < 1) { setMsg("데이터를 1줄 이상 입력해주세요."); return; }
    const delim = lines[0].includes("\t") ? "\t" : lines[0].includes(",") ? "," : lines[0].includes("/") ? "/" : "ws";
    const parsedLines = lines.map(l => splitLine(l, delim).map(c => c.trim()));
    const maxCols = Math.max(...parsedLines.map(l => l.length));
    const head = Array.from({ length: maxCols }, (_, i) => `열${i+1}`);
    const data = parsedLines.map(cells => {
      const obj = {};
      head.forEach((h,i) => obj[h] = cells[i] || "");
      return obj;
    });
    setHeaders(head); setRows(data);
    setMapRegion(head[0]||""); setMapDept(head[1]||""); setMapName(head[2]||""); setMapTarget(head[3]||""); setMapPhone(head[4]||"");
    setMsg(`✅ ${data.length}행 인식 완료! 아래에서 열 매칭을 확인해주세요.`);
  };

  const handleFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const wb = XLSX.read(e.target.result, { type: "binary" });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (json.length === 0) { setMsg("파일에서 데이터를 읽지 못했어요."); return; }
      const head = Object.keys(json[0]);
      setHeaders(head);
      setRows(json.map(r => { const o={}; head.forEach(h=>o[h]=String(r[h]??"")); return o; }));
      setMapRegion(head[0]||""); setMapDept(head[1]||""); setMapName(head[2]||""); setMapTarget(head[3]||""); setMapPhone(head[4]||"");
      setMsg("");
    };
    reader.readAsBinaryString(file);
  };

  const save = async () => {
    if (!rows || !mapName) return;
    setBusy(true); setMsg("");

    // 대상자 이름+번호 열이 모두 매핑된 경우에만 중복 지문 계산
    const canDedup = !!(mapTarget && mapPhone);
    const fingerprints = canDedup
      ? await Promise.all(rows.map(r => dedupFingerprint(r[mapTarget], r[mapPhone])))
      : rows.map(() => null);

    let existingMap = {};
    if (canDedup) {
      const hashes = [...new Set(fingerprints.filter(Boolean))];
      if (hashes.length > 0) {
        const { data: existing } = await supabase.from("entries")
          .select("id, dedup_hash, created_at")
          .eq("role", role).eq("is_duplicate", false).in("dedup_hash", hashes);
        (existing || []).forEach(e => {
          if (!existingMap[e.dedup_hash] || new Date(e.created_at) < new Date(existingMap[e.dedup_hash].created_at)) {
            existingMap[e.dedup_hash] = e;
          }
        });
      }
    }

    const seenInBatch = {};
    let dupCount = 0;
    const payload = rows.map((r, i) => {
      const fp = fingerprints[i];
      let isDup = false, dupOfId = null;
      if (fp) {
        if (existingMap[fp]) { isDup = true; dupOfId = existingMap[fp].id; }
        else if (seenInBatch[fp]) { isDup = true; } // 같은 배치 안에서도 중복
        seenInBatch[fp] = true;
      }
      if (isDup) dupCount++;
      return {
        role,
        region: mapRegion ? r[mapRegion] : null,
        dept: mapDept ? r[mapDept] : null,
        owner_name: maskName(r[mapName] || ""),
        target_name: mapTarget ? maskName(r[mapTarget] || "") : null,
        phone_masked: mapPhone ? maskPhone(r[mapPhone]) : null,
        metric: mapValue ? (Number(r[mapValue]) || 1) : 1,
        dedup_hash: fp, is_duplicate: isDup, duplicate_of: dupOfId,
      };
    }).filter(r => r.owner_name);

    if (dupCount > 0) {
      const proceed = window.confirm(`${dupCount}건이 이미 등록된 대상자와 중복돼요. 그래도 전부 등록할까요? (중복 건은 "중복"으로 표시되고, 먼저 등록된 기록이 우선순위예요)`);
      if (!proceed) { setBusy(false); return; }
    }

    const { error } = await supabase.from("entries").insert(payload);
    setBusy(false);
    if (error) { setMsg("저장 실패: " + error.message); return; }
    setMsg(`✅ ${payload.length}건 저장 완료!${dupCount>0?` (중복 ${dupCount}건 포함)`:""}`);
    setRows(null); setRawText("");
    onSaved();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-lg rounded-t-2xl md:rounded-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="text-lg font-extrabold" style={{color:C.text}}>일괄 등록</div>
          <button onClick={onClose}>✕</button>
        </div>

        <Field label="적용할 역할">
          <select value={role} onChange={e=>setRole(e.target.value)} style={inputStyle}>
            {Object.keys(roles).map(k => <option key={k} value={k}>{roles[k].label}</option>)}
          </select>
        </Field>

        <div className="mt-4">
          <div style={{color:C.sub}} className="text-xs font-semibold mb-1">데이터를 바로 붙여넣기 (제목 줄 없이, 탭/쉼표/슬래시/공백 구분 다 인식돼요)</div>
          <div style={{background:C.bg,color:C.text}} className="text-xs font-semibold rounded-lg px-3 py-2 mb-2">
            순서(고정): 직원 지역 / 직원 부서 / 직원 이름 / 대상자(프루트) 이름 / 번호
            <div style={{color:C.sub}} className="font-normal font-mono mt-1">예시) 본부/1팀/홍길동/이서준/010-1111-2222</div>
          </div>
          <textarea value={rawText} onChange={e=>setRawText(e.target.value)} rows={5} style={{...inputStyle, fontFamily:"monospace"}} placeholder={"여기에 데이터를 붙여넣으세요"} />
          <button onClick={parseText} style={{background:C.slate}} className="text-white text-xs font-bold px-4 py-2 rounded-lg mt-2">텍스트 불러오기</button>
        </div>

        <div className="mt-4">
          <div style={{color:C.sub}} className="text-xs font-semibold mb-1">또는 파일 업로드 (csv / xlsx)</div>
          <input type="file" accept=".csv,.xlsx,.xls" onChange={e=>e.target.files[0] && handleFile(e.target.files[0])} />
        </div>

        {msg && (
          <div style={{color: msg.includes("실패")||msg.includes("필요") ? C.danger : C.goldBright}} className="text-xs font-semibold mt-3">{msg}</div>
        )}

        {rows && (
          <div className="mt-5">
            <div className="font-bold mb-2 text-sm" style={{color:C.text}}>열 매칭 확인 ({rows.length}행)</div>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <Field label="직원 지역 열"><select value={mapRegion} onChange={e=>setMapRegion(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="직원 부서 열"><select value={mapDept} onChange={e=>setMapDept(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="직원 이름 열 (필수)"><select value={mapName} onChange={e=>setMapName(e.target.value)} style={inputStyle}>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="대상자(프루트) 이름 열 (선택)"><select value={mapTarget} onChange={e=>setMapTarget(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="번호 열 (대상자 번호, 선택)"><select value={mapPhone} onChange={e=>setMapPhone(e.target.value)} style={inputStyle}><option value="">(없음)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
              <Field label="값(건수) 열 - 없으면 1건씩"><select value={mapValue} onChange={e=>setMapValue(e.target.value)} style={inputStyle}><option value="">(없음, 1건씩)</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></Field>
            </div>
            <div className="max-h-40 overflow-y-auto border rounded-lg" style={{borderColor:C.border}}>
              <table className="w-full text-xs">
                <thead style={{background:C.bg}}><tr>{headers.map(h=><th key={h} className="text-left px-2 py-1.5">{h}</th>)}</tr></thead>
                <tbody>{rows.slice(0,15).map((r,i)=>(<tr key={i} className="border-t" style={{borderColor:C.border}}>{headers.map(h=><td key={h} className="px-2 py-1.5">{r[h]}</td>)}</tr>))}</tbody>
              </table>
            </div>
            <button onClick={save} disabled={busy} style={{background:C.emerald,color:C.ink}} className="font-bold py-3 rounded-xl mt-3 w-full">{busy?"저장 중...":`${rows.length}건 저장하기`}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function SiteTextManager({ siteTexts, onClose, onChanged }) {
  const [marquee, setMarquee] = useState(siteTexts.marquee_text || "");
  const [heroTitle, setHeroTitle] = useState(siteTexts.hero_title || "");
  const [heroSubtitle, setHeroSubtitle] = useState(siteTexts.hero_subtitle || "");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [uploadingKey, setUploadingKey] = useState(null);

  const save = async () => {
    setBusy(true); setMsg("");
    const rows = [
      { text_key: "marquee_text", content: marquee },
      { text_key: "hero_title", content: heroTitle },
      { text_key: "hero_subtitle", content: heroSubtitle },
    ];
    const { error } = await supabase.from("site_texts").upsert(rows, { onConflict: "text_key" });
    setBusy(false);
    if (error) { setMsg("저장 실패: " + error.message); return; }
    setMsg("✅ 저장 완료! 모든 직원 화면에 바로 반영돼요.");
    onChanged();
  };

  const uploadPoster = async (file, textKey) => {
    if (!file) return;
    setUploadingKey(textKey); setMsg("");
    const path = `${textKey}-${Date.now()}.${file.name.split(".").pop()}`;
    const { error: upErr } = await supabase.storage.from("site-assets").upload(path, file, { upsert: true });
    if (upErr) { setUploadingKey(null); setMsg("업로드 실패: " + upErr.message); return; }
    const { data: pub } = supabase.storage.from("site-assets").getPublicUrl(path);
    const { error: dbErr } = await supabase.from("site_texts").upsert(
      [{ text_key: textKey, content: pub.publicUrl }], { onConflict: "text_key" }
    );

function RegionDeptManager({ regionRows, deptRows, onClose, onRegionsChanged, onDeptsChanged }) {
  const [tab, setTab] = useState("region");
  const [regions, setRegions] = useState(regionRows);
  const [depts, setDepts] = useState(deptRows);
  const [newKey, setNewKey] = useState("");
  const [newName, setNewName] = useState("");
  const [busyKey, setBusyKey] = useState(null);
  const [msg, setMsg] = useState("");

  const isRegion = tab === "region";
  const rows = isRegion ? regions : depts;
  const setRows = isRegion ? setRegions : setDepts;
  const table = isRegion ? "regions" : "depts";
  const keyField = isRegion ? "region_key" : "dept_key";
  const onChanged = isRegion ? onRegionsChanged : onDeptsChanged;

  const update = (key, field, value) => {
    setRows(prev => prev.map(r => r[keyField] === key ? { ...r, [field]: value } : r));
  };

  const saveRow = async (row) => {
    setBusyKey(row[keyField]); setMsg("");
    const { error } = await supabase.from(table).update({ display_name: row.display_name }).eq(keyField, row[keyField]);
    setBusyKey(null);
    if (error) { setMsg("저장 실패: " + error.message); return; }
    setMsg("✅ 저장했어요.");
    onChanged();
  };

  const deleteRow = async (key) => {
    if (!window.confirm("삭제할까요? 이미 등록된 기록의 값은 그대로 남지만, 목록에서는 더 이상 선택할 수 없어요.")) return;
    setBusyKey(key); setMsg("");
    const { error } = await supabase.from(table).delete().eq(keyField, key);
    setBusyKey(null);
    if (error) { setMsg("삭제 실패: " + error.message); return; }
    setRows(prev => prev.filter(r => r[keyField] !== key));
    onChanged();
  };

  const addRow = async () => {
    if (!newKey || !newName) { setMsg("값과 이름을 입력해주세요."); return; }
    const sort_order = rows.length ? Math.max(...rows.map(r=>r.sort_order||0)) + 1 : 1;
    setBusyKey("__new__"); setMsg("");
    const { error } = await supabase.from(table).insert({ [keyField]: newKey, display_name: newName, sort_order });
    setBusyKey(null);
    if (error) { setMsg("추가 실패: " + error.message); return; }
    setNewKey(""); setNewName("");
    onChanged();
    const { data } = await supabase.from(table).select("*").order("sort_order", { ascending: true });
    setRows(data || []);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-md rounded-t-3xl md:rounded-3xl p-6 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div style={{color:C.text,fontFamily:FONT_DISPLAY}} className="text-xl">지역/부서 관리</div>
          <button onClick={onClose}>✕</button>
        </div>
        <div style={{background:C.bg}} className="flex gap-1 mb-4 p-1 rounded-full">
          <button onClick={()=>setTab("region")} style={{background:tab==="region"?C.ink:"transparent",color:tab==="region"?"#fff":C.sub}} className="flex-1 py-2 rounded-full text-sm font-bold">지역</button>
          <button onClick={()=>setTab("dept")} style={{background:tab==="dept"?C.ink:"transparent",color:tab==="dept"?"#fff":C.sub}} className="flex-1 py-2 rounded-full text-sm font-bold">부서</button>
        </div>
        <p style={{color:C.sub}} className="text-xs mb-4">이름을 바꾸면 이미 등록된 기록에도 바로 반영돼요 (내부 값은 그대로, 표시 이름만 바뀌는 방식).</p>

        <div className="flex flex-col gap-3 mb-5">
          {rows.map(row => (
            <div key={row[keyField]} style={{border:`1px solid ${C.border}`}} className="rounded-xl p-3 flex items-center gap-2">
              <div style={{color:C.sub}} className="text-[10px] font-bold w-20 flex-shrink-0 truncate">{row[keyField]}</div>
              <input value={row.display_name} onChange={e=>update(row[keyField],"display_name",e.target.value)} style={{...inputStyle, padding:"6px 10px"}} />
              <button onClick={()=>saveRow(row)} disabled={busyKey===row[keyField]} style={{background:C.amber,color:C.ink}} className="text-[11px] font-bold px-3 py-2 rounded-full flex-shrink-0">저장</button>
              <button onClick={()=>deleteRow(row[keyField])} disabled={busyKey===row[keyField]} style={{color:C.danger}} className="text-[11px] font-bold px-2 flex-shrink-0">삭제</button>
            </div>
          ))}
        </div>

        <div style={{border:`1px dashed ${C.border}`}} className="rounded-2xl p-4">
          <div style={{color:C.text,fontFamily:FONT_DISPLAY}} className="text-sm mb-3">＋ {isRegion?"지역":"부서"} 추가</div>
          <div className="grid grid-cols-2 gap-2 mb-2">
            <Field label="내부 값 (영문/코드 권장)"><input value={newKey} onChange={e=>setNewKey(e.target.value)} placeholder={isRegion?"예: 강남":"예: DEPT_J"} style={inputStyle} /></Field>
            <Field label="표시 이름"><input value={newName} onChange={e=>setNewName(e.target.value)} placeholder={isRegion?"예: 강남지사":"예: 3팀"} style={inputStyle} /></Field>
          </div>
          {msg && <div style={{color: msg.includes("실패")?C.danger:C.teal}} className="text-xs font-semibold mt-1">{msg}</div>}
          <button onClick={addRow} disabled={busyKey==="__new__"} style={{background:C.ink}} className="w-full text-white text-sm font-bold py-2.5 rounded-full mt-2">추가하기</button>
        </div>
      </div>
    </div>
  );
}

function PhotoUploadModal({ profile, onClose, onChanged }) {
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [preview, setPreview] = useState(profile.photo_url || null);

  const upload = async (file) => {
    if (!file) return;
    setBusy(true); setMsg("");
    const ext = file.name.split(".").pop();
    await supabase.storage.from("profile-photos").remove(
      ["jpg","jpeg","png","webp","gif"].filter(e=>e!==ext).map(e => `${profile.id}/photo.${e}`)
    );
    const path = `${profile.id}/photo.${ext}`;
    const { error: upErr } = await supabase.storage.from("profile-photos").upload(path, file, { upsert: true });
    if (upErr) { setBusy(false); setMsg("업로드 실패: " + upErr.message); return; }
    const { data: pub } = supabase.storage.from("profile-photos").getPublicUrl(path);
    const cacheBusted = `${pub.publicUrl}?t=${Date.now()}`;
    const { error: dbErr } = await supabase.from("profiles").update({ photo_url: cacheBusted }).eq("id", profile.id);
    setBusy(false);
    if (dbErr) { setMsg("저장 실패: " + dbErr.message); return; }
    setPreview(cacheBusted);
    setMsg("✅ 등록 완료! 1~3등 하면 이 사진이 보여요.");
    onChanged();
  };

  const remove = async () => {
    if (!window.confirm("등록한 사진을 지울까요?")) return;
    setBusy(true); setMsg("");
    await supabase.storage.from("profile-photos").remove(
      ["jpg","jpeg","png","webp","gif"].map(ext => `${profile.id}/photo.${ext}`)
    );
    const { error } = await supabase.from("profiles").update({ photo_url: null }).eq("id", profile.id);
    setBusy(false);
    if (error) { setMsg("삭제 실패: " + error.message); return; }
    setPreview(null);
    setMsg("사진을 지웠어요.");
    onChanged();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card, border:`1px solid ${C.amberLine}55`}} className="w-full max-w-sm rounded-t-3xl md:rounded-3xl p-6">
        <div className="flex items-center justify-between mb-2">
          <div style={{color:C.text,fontFamily:FONT_DISPLAY}} className="text-xl">내 사진 등록</div>
          <button onClick={onClose} style={{color:C.sub}}>✕</button>
        </div>
        <p style={{color:C.sub}} className="text-xs mb-4">본인 동의하에, 1~3등 했을 때 순위 카드에 보일 사진이에요. 다른 사람은 못 바꿔요. 안 올리면 지금처럼 실루엣으로 나와요.</p>

        {preview && (
          <div className="flex justify-center mb-4">
            <img src={preview} alt="미리보기" style={{width:96, height:96, borderRadius:"9999px", objectFit:"cover", border:`3px solid ${C.goldBright}`}} />
          </div>
        )}

        <div className="flex flex-col gap-3">
          <input type="file" accept="image/*" onChange={e=>upload(e.target.files[0])} disabled={busy} />
          {msg && <div style={{color: msg.includes("실패")?C.danger:C.teal}} className="text-xs font-semibold">{msg}</div>}
          {preview && <button onClick={remove} disabled={busy} style={{color:C.danger,border:`1px solid ${C.danger}55`}} className="text-xs font-bold py-2 rounded-full">사진 삭제하고 실루엣으로 되돌리기</button>}
        </div>
      </div>
    </div>
  );
}

function EntryForm({ profile, roles, regionRows, deptRows, onClose, onSubmitted }) {
  const [dept, setDept] = useState(profile.dept || (deptRows[0] && deptRows[0].dept_key) || "");
  const [region, setRegion] = useState(profile.region || (regionRows[0] && regionRows[0].region_key) || "");
  const [targetName, setTargetName] = useState("");
  const [phone, setPhone] = useState("");
  const [metric, setMetric] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const role = profile.role;
  const isManual = roles[role]?.metricType === "manual";

  const submit = async () => {
    if (!targetName || !phone) return;
    setBusy(true); setError("");

    const fp = await dedupFingerprint(targetName, phone);
    let isDup = false, dupOfId = null;
    if (fp) {
      const { data: existing } = await supabase.from("entries")
        .select("id, target_name, created_at")
        .eq("role", role).eq("dedup_hash", fp).eq("is_duplicate", false)
        .order("created_at", { ascending: true }).limit(1);
      if (existing && existing.length > 0) {
        const first = existing[0];
        const proceed = window.confirm(
          `이미 같은 대상자가 등록되어 있어요 (${first.target_name}, ${new Date(first.created_at).toISOString().slice(0,10)} 최초 등록).\n` +
          `그래도 등록하시겠어요? (먼저 등록한 기록이 우선순위로 처리되고, 이번 건은 "중복"으로 표시돼요)`
        );
        if (!proceed) { setBusy(false); return; }
        isDup = true; dupOfId = first.id;
      }
    }

    const { error } = await supabase.from("entries").insert({
      owner_id: profile.id, role, region, dept,
      target_name: maskName(targetName), // 원본은 저장하지 않고 마스킹된 값만 저장
      phone_masked: maskPhone(phone),
      metric: isManual ? Number(metric||0) : 1,
      dedup_hash: fp, is_duplicate: isDup, duplicate_of: dupOfId,
    });
    setBusy(false);
    if (error) { setError(error.message); return; }
    onSubmitted();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{background:"#00000055"}}>
      <div style={{background:C.card}} className="w-full max-w-md rounded-t-2xl md:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="text-lg font-extrabold" style={{color:C.text}}>실적 등록 · {roles[role]?.label}</div>
          <button onClick={onClose}>✕</button>
        </div>
        <div className="flex flex-col gap-3">
          <Field label="지역"><select value={region} onChange={e=>setRegion(e.target.value)} style={inputStyle}>{regionRows.map(r=><option key={r.region_key} value={r.region_key}>{r.display_name}</option>)}</select></Field>
          <Field label="부서"><select value={dept} onChange={e=>setDept(e.target.value)} style={inputStyle}>{deptRows.map(d=><option key={d.dept_key} value={d.dept_key}>{d.display_name}</option>)}</select></Field>
          <Field label="본인 이름"><input value={profile.name} disabled style={{...inputStyle,color:C.sub,background:C.bg}} /></Field>
          <Field label="프루트 이름"><input value={targetName} onChange={e=>setTargetName(e.target.value)} style={inputStyle} /></Field>
          <Field label="번호"><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="010-0000-0000" style={inputStyle} /></Field>
          <div style={{color:C.sub,background:C.bg}} className="text-[11px] rounded-lg px-3 py-2">
            이름·번호는 원본을 저장하지 않고, 등록 즉시 마스킹된 값만 저장돼요. 총관리자를 포함해 아무도 원본을 다시 볼 수 없고, 식별용 참고 정보로만 쓰입니다.
          </div>
          {error && <div style={{color:C.danger}} className="text-xs font-semibold">{error}</div>}
          <button onClick={submit} disabled={busy} style={{background:C.emerald,color:C.ink}} className="font-bold py-3 rounded-xl mt-1">{busy?"등록 중...":"등록하기"}</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
